<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: #101418; color: #e6e9ec; }
  header { position: sticky; top: 0; background: #161b21; padding: 10px 16px;
           display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #232a32; }
  header h1 { font-size: 16px; margin: 0; flex: 1; }
  #status { font-size: 12px; padding: 2px 10px; border-radius: 10px; background: #3a2f2f; color: #e0a0a0; }

<body>
<header>
  <button id="back" style="display:none">← 返回</button>
  <h1 id="title">Codex-ZH Remote</h1>
  <span id="status">连接中…</span>
</header>
<div id="approvals"></div>
<main>
  <div id="banner" class="banner"></div>
  <div id="list"><div class="notice">加载会话列表…</div></div>
  <div id="viewer">
    <div id="sstatus"></div>
    <div id="log"></div>
  </div>
</main>
<div id="composer">
  <span id="runhint">Codex 运行中…</span>
  <div class="crow">
    <textarea id="input" rows="1" placeholder="给 Codex 发消息…"></textarea>
    <button id="send">发送</button>
    <button id="stop">停止</button>
  </div>
</div>
<script type="module">
const $ = (id) => document.getElementById(id);
const enc = new TextEncoder();
const b64 = {
  to: (buf) => btoa(String.fromCharCode(...new Uint8Array(buf))),
  from: (str) => Uint8Array.from(atob(str.replace(/-/g, "+").replace(/_/g, "/")), (c) => c.charCodeAt(0)),
};
const AAD_C2D = enc.encode("czr1:c2d");
const AAD_D2C = enc.encode("czr1:d2c");

function loadDaemonInfo() {
  const hash = new URLSearchParams(location.hash.slice(1));
  if (hash.get("p")) {
    const payload = JSON.parse(new TextDecoder().decode(b64.from(hash.get("p"))));
    history.replaceState(null, "", location.pathname); // 配对码不留在地址栏
    return { ...payload, fromPair: true };
  }
  const saved = localStorage.getItem("czr-daemon");
  return saved ? JSON.parse(saved) : null;
}

// —— 纯 JS X25519 后备（RFC 7748，BigInt）——
// 国内安卓浏览器 / 微信内核普遍不支持 WebCrypto 的 X25519（Chrome 133+ 才默认开启），
// 原生不可用时自动降级到此实现（已与 node:crypto 官方实现交叉验证）。
const P = 2n ** 255n - 19n;
const A24 = 121665n;
function leToBig(bytes) {
  let n = 0n;
  for (let i = bytes.length - 1; i >= 0; i--) n = (n << 8n) | BigInt(bytes[i]);
  return n;
}
function bigToLe(n, len) {
  const out = new Uint8Array(len);
  for (let i = 0; i < len; i++) { out[i] = Number(n & 0xffn); n >>= 8n; }
  return out;
}
function modPow(base, exp, mod) {
  let result = 1n; base %= mod;
  while (exp > 0n) {
    if (exp & 1n) result = result * base % mod;
    base = base * base % mod; exp >>= 1n;
  }
  return result;
}
function x25519Js(scalarBytes, uBytes) {
  const s = Uint8Array.from(scalarBytes);
  s[0] &= 248; s[31] &= 127; s[31] |= 64;
  const k = leToBig(s);
  const u = Uint8Array.from(uBytes); u[31] &= 127;
  const x1 = leToBig(u) % P;
  let x2 = 1n, z2 = 0n, x3 = x1, z3 = 1n, swap = 0n;
  for (let t = 254; t >= 0; t--) {
    const kt = (k >> BigInt(t)) & 1n;
    swap ^= kt;
    if (swap) { [x2, x3] = [x3, x2]; [z2, z3] = [z3, z2]; }
    swap = kt;
    const a = (x2 + z2) % P, aa = a * a % P;
    const b = (x2 - z2 + P) % P, bb = b * b % P;
    const e = (aa - bb + P) % P;
    const c = (x3 + z3) % P, d = (x3 - z3 + P) % P;
    const da = d * a % P, cb = c * b % P;
    x3 = (da + cb) % P; x3 = x3 * x3 % P;
    z3 = (da - cb + P) % P; z3 = z3 * z3 % P; z3 = z3 * x1 % P;
    x2 = aa * bb % P;
    z2 = e * ((aa + A24 * e) % P) % P;
  }
  if (swap) { [x2, x3] = [x3, x2]; [z2, z3] = [z3, z2]; }
  return bigToLe(x2 * modPow(z2, P - 2n, P) % P, 32);
}
const BASE9 = (() => { const b = new Uint8Array(32); b[0] = 9; return b; })();

// 协商共享密钥：原生 X25519 优先，失败降级纯 JS
async function x25519Shared(daemonPubRaw) {
  try {
    const eph = await crypto.subtle.generateKey({ name: "X25519" }, false, ["deriveBits"]);
    const pub = await crypto.subtle.importKey("raw", daemonPubRaw, { name: "X25519" }, false, []);
    const shared = new Uint8Array(await crypto.subtle.deriveBits({ name: "X25519", public: pub }, eph.privateKey, 256));
    const ephPubRaw = new Uint8Array(await crypto.subtle.exportKey("raw", eph.publicKey));
    return { shared, ephPubRaw };
  } catch {
    const priv = crypto.getRandomValues(new Uint8Array(32));
    return { shared: x25519Js(priv, daemonPubRaw), ephPubRaw: x25519Js(priv, BASE9) };
  }
}

// HKDF-SHA256：原生 HKDF 优先，失败降级 HMAC 手动展开（输出 32 字节，单块足够）
async function hkdfAesKey(shared, daemonInfo) {
  const salt = enc.encode(daemonInfo.id);
  const info = enc.encode("codex-zh-remote-v1");
  try {
    const hk = await crypto.subtle.importKey("raw", shared, "HKDF", false, ["deriveKey"]);
    return await crypto.subtle.deriveKey(
      { name: "HKDF", hash: "SHA-256", salt, info },
      hk, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"],
    );
  } catch {
    const saltKey = await crypto.subtle.importKey("raw", salt, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
    const prk = new Uint8Array(await crypto.subtle.sign("HMAC", saltKey, shared));
    const prkKey = await crypto.subtle.importKey("raw", prk, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
    const input = new Uint8Array(info.length + 1);
    input.set(info, 0); input[info.length] = 1;
    const okm = new Uint8Array(await crypto.subtle.sign("HMAC", prkKey, input)).subarray(0, 32);
    return await crypto.subtle.importKey("raw", okm, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
  }
}

async function deriveKey(daemonInfo) {
  if (!crypto?.subtle) throw new Error("此浏览器不支持 WebCrypto（需 HTTPS 环境与较新内核）");
  const { shared, ephPubRaw } = await x25519Shared(b64.from(daemonInfo.pk));
  if (shared.every((byte) => byte === 0)) throw new Error("密钥协商失败");
  const key = await hkdfAesKey(shared, daemonInfo);
  return { key, ephPubRaw };
}

// 连接管理：自动重连（指数退避）+ 重鉴权，断线对上层透明。
class Session {
  constructor(daemonInfo) {
    this.info = daemonInfo;
    this.pendingRequests = new Map();
    this.nextId = 1;
    this.firstFrame = true;
    this.closedByUser = false;
    this.reconnectAttempt = 0;
    this.onNotify = () => {};
    this.onStatus = () => {};   // (online, text)
    this.onReady = () => {};    // 每次（重）鉴权成功后回调，供上层重拉/重watch
  }

  async start() {
    this.closedByUser = false;
    await this.#openAndAuth();
  }

  async #openAndAuth() {
    const { key, ephPubRaw } = await deriveKey(this.info);
    this.key = key;
    this.ephPubRaw = ephPubRaw;
    this.firstFrame = true;
    const ws = new WebSocket(`${this.info.relay.replace(/\/$/, "")}/v1/client/${this.info.id}`);
    this.ws = ws;
    await new Promise((ok, bad) => {
      ws.onopen = ok;
      ws.onerror = () => bad(new Error("无法连接中继"));
    });
    ws.onmessage = (e) => this.onFrame(JSON.parse(e.data));
    ws.onclose = () => this.#onClose();
    // 首次用配对码，之后一律用设备令牌
    const authParams = this.info.fromPair
      ? { pairToken: this.info.tok }
      : { deviceToken: this.info.deviceToken };
    const auth = await this.request("auth", authParams);
    if (auth.deviceToken) {
      this.info = { ...this.info, fromPair: false, deviceToken: auth.deviceToken, name: auth.daemonName };
      localStorage.setItem("czr-daemon", JSON.stringify({
        relay: this.info.relay, id: this.info.id, pk: this.info.pk,
        name: auth.daemonName, deviceToken: auth.deviceToken,
      }));
    }
    this.reconnectAttempt = 0;
    this.onReady(auth);
  }

  #onClose() {
    for (const [, p] of this.pendingRequests) p.reject(new Error("连接断开"));
    this.pendingRequests.clear();
    if (this.closedByUser) return;
    const delay = Math.min(1000 * 2 ** this.reconnectAttempt, 15000);
    this.reconnectAttempt += 1;
    this.onStatus(false, `重连中…`);
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.#openAndAuth().catch(() => this.#onClose());
    }, delay);
  }

  // 回到前台时立即重连，不等退避计时（锁屏/切走会断开 WebSocket）
  ensureAlive() {
    if (this.closedByUser) return;
    if (this.ws?.readyState === WebSocket.OPEN) return;
    if (this.reconnectTimer) {
      clearTimeout(this.reconnectTimer);
      this.reconnectTimer = null;
    }
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  async onFrame(frame) {
    if (frame.t === "status") { this.onStatus(frame.online, frame.online ? "在线" : "电脑离线"); return; }
    if (frame.t !== "msg") return;
    const env = frame.data;
    const iv = b64.from(env.n);
    const data = b64.from(env.c);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv, additionalData: AAD_D2C }, this.key, data);
    const msg = JSON.parse(new TextDecoder().decode(plain));
    if (msg.id !== undefined && this.pendingRequests.has(msg.id)) {
      const { resolve, reject } = this.pendingRequests.get(msg.id);
      this.pendingRequests.delete(msg.id);
      msg.error ? reject(new Error(msg.error.message)) : resolve(msg.result);
    } else if (msg.method) {
      this.onNotify(msg);
    }
  }

  async send(payload) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cipher = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: AAD_C2D }, this.key, enc.encode(JSON.stringify(payload)));
    const envelope = { n: b64.to(iv), c: b64.to(cipher) };
    if (this.firstFrame) {
      envelope.v = 1;
      envelope.k = b64.to(this.ephPubRaw);
      this.firstFrame = false;
    }
    this.ws.send(JSON.stringify({ t: "msg", data: envelope }));
  }

  request(method, params = {}, timeoutMs = 15000) {
    const id = this.nextId++;
    return new Promise((resolve, reject) => {
      this.pendingRequests.set(id, { resolve, reject });
      this.send({ id, method, params }).catch(reject);
      setTimeout(() => {
        if (this.pendingRequests.has(id)) {
          this.pendingRequests.delete(id);
          reject(new Error(`请求超时: ${method}`));
        }
      }, timeoutMs);
    });
  }
}

// —— rollout 条目渲染 ——
// 关键：codex 把每条逻辑消息写两遍——语义事件 `event_msg`（agent_message/
// user_message）+ OpenAI API 格式 `response_item`（message）。二者内容相同，
// 若都渲染就会重复（"两条收到"）。只认 event_msg 语义流，response_item 一律跳过。
function extractText(value, depth = 0) {
  if (depth > 4 || value == null) return "";
  if (typeof value === "string") return value;
  if (Array.isArray(value)) return value.map((v) => extractText(v, depth + 1)).filter(Boolean).join("\n");
  if (typeof value === "object") {
    for (const k of ["text", "message", "content", "command", "aggregated_output"]) {
      if (k in value) {
        const got = extractText(value[k], depth + 1);
        if (got) return got;
      }
    }
  }
  return "";
}

// event_msg 白名单：仅这些子类型作为对话气泡渲染
const EVENT_BUBBLE = {
  user_message:  { cls: "user",      tag: "我",    pick: (p) => p.message },
  agent_message: { cls: "assistant", tag: "Codex", pick: (p) => p.message },
  exec_command_begin: { cls: "command", tag: "命令",
    pick: (p) => Array.isArray(p.command) ? p.command.join(" ") : (p.command ?? "") },
};

// 一条 rollout item -> 气泡 {cls,tag,text}，或 null（跳过）
function itemToBubble(item) {
  if (item?.type === "event_msg") {
    const spec = EVENT_BUBBLE[item.payload?.type];
    if (!spec) return null; // task_started/token_count/reasoning 等非气泡事件跳过
    const text = String(spec.pick(item.payload) ?? "").trim();
    return text ? { cls: spec.cls, tag: spec.tag, text } : null;
  }
  // response_item（与 event_msg 重复）、turn_context、session_meta：跳过
  if (["response_item", "turn_context", "session_meta"].includes(item?.type)) return null;
  // 更老格式（无 event_msg）：回退通用提取，保持旧会话兼容
  const text = extractText(item?.payload ?? item).trim();
  if (!text) return null;
  const t = `${item?.type ?? ""}:${item?.payload?.type ?? ""}`;
  if (/user/i.test(t)) return { cls: "user", tag: "我", text };
  if (/command|exec|shell/i.test(t)) return { cls: "command", tag: "命令", text };
  if (/agent|assistant|message/i.test(t)) return { cls: "assistant", tag: "Codex", text };
  return null; // 未知且非消息：不渲染，避免噪声
}

// —— 应用控制器 ——
const app = {
  session: null,
  view: "list",        // "list" | "session"
  currentId: null,     // 打开的会话 id
  currentTitle: "",
  running: false,      // 该会话是否有进行中的轮次
  sessionNames: new Map(), // id -> 展示名（审批卡片用）
  approvalsPending: 0,
  refreshTimer: null,
};

function showBanner(text) {
  $("banner").style.display = text ? "block" : "none";
  $("banner").textContent = text || "";
}

function relTime(sec) {
  if (!sec) return "";
  const d = Date.now() / 1000 - sec;
  if (d < 60) return "刚刚";
  if (d < 3600) return `${Math.floor(d / 60)} 分钟前`;
  if (d < 86400) return `${Math.floor(d / 3600)} 小时前`;
  if (d < 7 * 86400) return `${Math.floor(d / 86400)} 天前`;
  return new Date(sec * 1000).toLocaleDateString();
}

function sessionCard(s) {
  const card = document.createElement("div");
  const busy = s.running || s.active;
  card.className = `card${s.approvals ? " warn" : busy ? " hot" : ""}`;
  const preview = document.createElement("div");
  preview.className = "preview";
  if (busy && !s.approvals) {
    const dot = document.createElement("span");
    dot.className = "pulse";
    preview.appendChild(dot);
  }
  preview.appendChild(document.createTextNode(s.name || s.preview || "（无标题）"));
  const meta = document.createElement("div");
  meta.className = "meta";
  const dir = (s.cwd || "").split("/").pop() || s.cwd || "";
  meta.textContent = [dir, relTime(s.updatedAt)].filter(Boolean).join("　·　");
  card.append(preview, meta);
  if (s.approvals) {
    const b = document.createElement("span");
    b.className = "badge appr";
    b.textContent = "等待审批";
    card.appendChild(b);
  } else if (busy) {
    const b = document.createElement("span");
    b.className = "badge run";
    b.textContent = "运行中";
    card.appendChild(b);
  }
  card.onclick = () => openSession(s.id, s.name || s.preview?.slice(0, 24) || "会话");
  return card;
}

// 任务看板：待审批 > 运行中 > 继续上次 > 最近
function renderList(sessions) {
  app.sessionNames = new Map(sessions.map((s) => [s.id, s.name || s.preview?.slice(0, 24) || "会话"]));
  const list = $("list");
  list.innerHTML = "";

  const attention = sessions.filter((s) => s.approvals || s.running || s.active);
  const rest = sessions.filter((s) => !attention.includes(s));
  attention.sort((a, b) => (b.approvals || 0) - (a.approvals || 0));

  if (attention.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "进行中";
    list.appendChild(h);
    for (const s of attention) list.appendChild(sessionCard(s));
  }

  // 继续上次打开的会话（不在"进行中"里时才显示，避免重复）
  const last = JSON.parse(localStorage.getItem("czr-last") || "null");
  const lastSession = last && !attention.some((s) => s.id === last.id)
    ? rest.find((s) => s.id === last.id) : null;

  const h2 = document.createElement("div");
  h2.className = "secthead";
  h2.textContent = "最近";
  list.appendChild(h2);
  const nl = document.createElement("div");
  nl.className = "newbtn";
  nl.textContent = "＋ 新建会话";
  nl.onclick = newSession;
  list.appendChild(nl);
  if (lastSession) {
    const c = sessionCard(lastSession);
    c.querySelector(".meta").textContent = `上次查看　·　${c.querySelector(".meta").textContent}`;
    list.appendChild(c);
  }
  for (const s of rest) {
    if (lastSession && s.id === lastSession.id) continue;
    list.appendChild(sessionCard(s));
  }
  if (!sessions.length) {
    const n = document.createElement("div");
    n.className = "notice";
    n.textContent = "暂无会话";
    list.appendChild(n);
  }
}

async function refreshList() {
  const { sessions } = await app.session.request("sessions.list", { limit: 50 });
  renderList(sessions);
}

// 看板变化时节流刷新（仅列表视图）
function scheduleListRefresh() {
  if (app.view !== "list" || app.refreshTimer) return;
  app.refreshTimer = setTimeout(() => {
    app.refreshTimer = null;
    if (app.view === "list") refreshList().catch(() => {});
  }, 800);
}

async function openSession(id, title) {
  app.view = "session";
  app.currentId = id;
  app.currentTitle = title;
  app.running = false;
  localStorage.setItem("czr-last", JSON.stringify({ id, title }));
  $("list").classList.add("hidden");
  $("viewer").classList.add("active");
  $("composer").classList.add("active");
  $("back").style.display = "";
  $("title").textContent = title;
  $("log").innerHTML = '<div class="notice">加载中…</div>';
  setRunning(false);
  await app.session.request("session.watch", { sessionId: id });
}

async function closeSession() {
  await app.session.request("session.unwatch").catch(() => {});
  app.view = "list";
  app.currentId = null;
  $("viewer").classList.remove("active");
  $("composer").classList.remove("active");
  $("log").innerHTML = "";
  $("list").classList.remove("hidden");
  $("back").style.display = "none";
  $("title").textContent = app.session?.info.name || "Codex-ZH Remote";
  await refreshList().catch(() => {});
}

function setRunning(running) {
  app.running = running;
  $("send").style.display = running ? "none" : "";
  $("stop").style.display = running ? "" : "none";
  $("runhint").style.display = running ? "" : "none";
  updateStatusStrip();
}

// 会话页状态条：等待审批 > 运行中 > 隐藏
function updateStatusStrip() {
  const el = $("sstatus");
  const hasApproval = document.querySelector(`#approvals .approval[data-sid="${app.currentId}"]`);
  if (hasApproval) {
    el.className = "appr";
    el.style.display = "block";
    el.textContent = "⏸ Codex 在等你的审批（见顶部卡片）";
  } else if (app.running) {
    el.className = "";
    el.style.display = "block";
    el.innerHTML = '<span class="pulse"></span>Codex 正在工作…';
  } else {
    el.style.display = "none";
  }
}

async function sendMessage() {
  const input = $("input");
  const text = input.value.trim();
  if (!text || !app.currentId) return;
  input.value = "";
  autoGrow();
  // 不乐观渲染用户气泡：会话文件会记录 user_message，由 tail 统一渲染，
  // 乐观追加会与 tail 重复。setRunning 立即给出"已发送/运行中"反馈。
  setRunning(true);
  try {
    // 首条消息含 resume + 模型初始化，可能较慢
    await app.session.request("session.send", { sessionId: app.currentId, text }, 90000);
  } catch (err) {
    setRunning(false);
    showBanner(`发送失败：${err.message}`);
  }
}

async function stopTurn() {
  if (!app.currentId) return;
  try {
    await app.session.request("turn.interrupt", { sessionId: app.currentId });
  } catch (err) {
    showBanner(`停止失败：${err.message}`);
  }
}

async function newSession() {
  const cwd = prompt("新会话的工作目录（留空用默认）：", "");
  if (cwd === null) return;
  try {
    const res = await app.session.request("session.new", { cwd: cwd.trim() || undefined }, 90000);
    if (res.threadId) openSession(res.threadId, "新会话");
    else showBanner("新建会话失败：未返回会话 id");
  } catch (err) {
    showBanner(`新建失败：${err.message}`);
  }
}

// —— 全局审批卡片：任何页面都置顶显示，任一设备处理后各端同步消失 ——
let titleBlink = null;
function updateTitleBlink() {
  const n = $("approvals").childElementCount;
  app.approvalsPending = n;
  if (n > 0 && !titleBlink) {
    let flip = false;
    titleBlink = setInterval(() => {
      flip = !flip;
      document.title = flip ? `（${$("approvals").childElementCount} 个审批）Codex-ZH` : "Codex-ZH Remote";
    }, 1200);
  } else if (n === 0 && titleBlink) {
    clearInterval(titleBlink);
    titleBlink = null;
    document.title = "Codex-ZH Remote";
  }
}

function showApproval(p) {
  if (document.querySelector(`#approvals .approval[data-key="${p.approvalKey}"]`)) return;
  const card = document.createElement("div");
  card.className = "approval";
  card.dataset.key = p.approvalKey;
  card.dataset.sid = p.sessionId;
  const title = document.createElement("div");
  title.className = "atitle";
  const sname = app.sessionNames.get(p.sessionId) || "会话";
  title.textContent = `${sname} · ${p.kind === "fileChange" ? "请求修改文件" : "请求执行命令"}`;
  const body = document.createElement("div");
  body.className = "acmd";
  body.textContent = Array.isArray(p.command) ? p.command.join(" ") : (p.command || p.reason || "（详情见电脑端）");
  const btns = document.createElement("div");
  btns.className = "abtns";
  const decide = async (decision) => {
    card.remove();
    updateTitleBlink();
    updateStatusStrip();
    try {
      const r = await app.session.request("approval.respond", { approvalKey: p.approvalKey, decision });
      if (!r.ok && r.reason) showBanner(`审批未生效：${r.reason}`);
    } catch (err) {
      showBanner(`审批失败：${err.message}`);
    }
  };
  const yes = document.createElement("button");
  yes.className = "ayes"; yes.textContent = "批准";
  yes.onclick = () => decide("accept");
  const no = document.createElement("button");
  no.className = "ano"; no.textContent = "拒绝";
  no.onclick = () => decide("decline");
  btns.append(yes, no);
  card.append(title, body, btns);
  $("approvals").appendChild(card);
  updateTitleBlink();
  updateStatusStrip();
  try { navigator.vibrate?.([180, 90, 180]); } catch {}
}

function resolveApproval(approvalKey) {
  document.querySelector(`#approvals .approval[data-key="${approvalKey}"]`)?.remove();
  updateTitleBlink();
  updateStatusStrip();
}

function appendBubble(cls, tag, text) {
  const div = document.createElement("div");
  div.className = `item ${cls}`;
  const t = document.createElement("span");
  t.className = "tag"; t.textContent = tag;
  div.appendChild(t);
  div.appendChild(document.createTextNode(text.length > 6000 ? `${text.slice(0, 6000)}…` : text));
  $("log").appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function renderInto(items) {
  const frag = document.createDocumentFragment();
  for (const item of items) {
    const bubble = itemToBubble(item);
    if (!bubble) continue;
    const { cls, tag, text } = bubble;
    const div = document.createElement("div");
    div.className = `item ${cls}`;
    const t = document.createElement("span");
    t.className = "tag"; t.textContent = tag;
    div.appendChild(t);
    const clipped = text.length > 6000 ? `${text.slice(0, 6000)}…` : text;
    // 长命令输出默认折叠：手机上大段输出会淹没对话主线
    const lines = clipped.split("\n");
    if (cls === "command" && lines.length > 6) {
      const head = document.createElement("span");
      head.textContent = lines.slice(0, 4).join("\n");
      const restText = lines.slice(4).join("\n");
      const fold = document.createElement("span");
      fold.className = "fold";
      fold.textContent = `▾ 展开其余 ${lines.length - 4} 行`;
      fold.onclick = () => {
        head.textContent = clipped;
        fold.remove();
      };
      div.append(head, document.createElement("br"), fold);
      void restText;
    } else {
      div.appendChild(document.createTextNode(clipped));
    }
    frag.appendChild(div);
  }
  $("log").appendChild(frag);
  window.scrollTo(0, document.body.scrollHeight);
}

// live 事件：内容仍以 rollout tail（snapshot/event）为准，
// live 仅用于运行状态指示与审批，避免与 tail 重复渲染。
function onLive(event) {
  if (event === "turn/started") setRunning(true);
  if (event === "turn/completed") setRunning(false);
}

function handleNotify(msg) {
  if (msg.method === "session.snapshot" && msg.params.sessionId === app.currentId) {
    $("log").innerHTML = "";
    renderInto(msg.params.items);
  } else if (msg.method === "session.event" && msg.params.sessionId === app.currentId) {
    renderInto(msg.params.items);
  } else if (msg.method === "session.live" && msg.params.sessionId === app.currentId) {
    onLive(msg.params.event);
  } else if (msg.method === "approval.request") {
    showApproval(msg.params); // 全局：任何页面都显示
  } else if (msg.method === "approval.resolved") {
    resolveApproval(msg.params.approvalKey); // 其他设备处理后同步消失
  } else if (msg.method === "board.changed") {
    scheduleListRefresh(); // 列表徽标随运行/审批状态刷新
  }
}

function autoGrow() {
  const el = $("input");
  el.style.height = "auto";
  el.style.height = `${Math.min(el.scrollHeight, 120)}px`;
}

// —— 启动 ——
async function main() {
  const info = loadDaemonInfo();
  if (!info) {
    $("list").innerHTML = '<div class="notice">未配对。请在电脑上运行配对命令，用本机扫码或打开配对链接。</div>';
    $("status").textContent = "未配对";
    return;
  }
  $("title").textContent = info.name || "Codex-ZH Remote";
  const session = new Session(info);
  app.session = session;
  session.onStatus = (online, text) => {
    $("status").textContent = text;
    $("status").classList.toggle("online", online);
  };
  session.onNotify = handleNotify;
  session.onReady = async () => {
    showBanner("");
    try {
      if (app.view === "session" && app.currentId) {
        // 重连后恢复当前会话的实时订阅
        await session.request("session.watch", { sessionId: app.currentId });
      } else {
        await refreshList();
      }
    } catch (err) {
      showBanner(`加载失败：${err.message}`);
    }
  };

  $("back").onclick = closeSession;
  $("send").onclick = sendMessage;
  $("stop").onclick = stopTurn;
  $("input").addEventListener("input", autoGrow);
  // 锁屏/切走后回到前台：立即重连并恢复
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") session.ensureAlive();
  });

  try {
    await session.start();
  } catch (err) {
    showBanner(`连接失败：${err.message}`);
  }
}
main();
</script>
