<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<title>Codex-叉叉</title>
<link rel="manifest" href="manifest.webmanifest">
<meta id="mtcdark" name="theme-color" media="(prefers-color-scheme: dark)" content="#171b22">
<meta id="mtclight" name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<script>
// 手动外观在首帧前生效，避免打开瞬间闪一下系统色（正式逻辑在主模块 applyTheme）
try {
  var t = localStorage.getItem("czr-theme");
  if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
} catch (e) {}
</script>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C叉叉">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1216;
    --raised: #171b22;
    --sunken: #0b0e12;
    --border: #272d37;
    --text: #e9ecef;
    --dim: #8f99a5;
    --accent: #4d8fd6;
    --accent-bg: #19273a;
    --user-bubble: #21384f;
    --ok: #3db273;
    --ok-bg: #14231b;
    --warn: #d9ae56;
    --warn-bg: #211c10;
    --warn-border: #5d4d22;
    --err: #d96a6a;
  }
  /* 外观三态：auto 跟随系统（media 决定），data-theme="light|dark" 手动锁定。
     深色即 :root 默认值；浅色变量在下面两个选择器里各出现一次（media 与强制），改动需同步。 */
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      color-scheme: light;
      --bg: #f5f6f8;
      --raised: #ffffff;
      --sunken: #eef0f3;
      --border: #e1e5ea;
      --text: #1d232b;
      --dim: #6d7784;
      --accent: #2f6fb0;
      --accent-bg: #e7effa;
      --user-bubble: #dfecf9;
      --ok: #1e9e57;
      --ok-bg: #e5f5ec;
      --warn: #9a721c;
      --warn-bg: #fbf4df;
      --warn-border: #e5cd8a;
      --err: #c05252;
    }
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f5f6f8;
    --raised: #ffffff;
    --sunken: #eef0f3;
    --border: #e1e5ea;
    --text: #1d232b;
    --dim: #6d7784;
    --accent: #2f6fb0;
    --accent-bg: #e7effa;
    --user-bubble: #dfecf9;
    --ok: #1e9e57;
    --ok-bg: #e5f5ec;
    --warn: #9a721c;
    --warn-bg: #fbf4df;
    --warn-border: #e5cd8a;
    --err: #c05252;
  }
  * { box-sizing: border-box; }
  /* 禁掉浏览器原生下拉刷新：会话/首页滚到顶再拉不会 reload（reload 会把 SPA 弹回首页） */
  html { overscroll-behavior-y: contain; }
  body { margin: 0; font: 15px/1.6 -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background: var(--bg); color: var(--text); overscroll-behavior-y: contain; }
  body.insession main { padding-bottom: 145px; }
  button { font: inherit; }
  /* 关掉系统的点按高亮：它按元素矩形盒子画方块（国产内核尤甚），与圆形/裸图标不符；
     按下反馈一律走各自的 :active（圆钮显示圆底色、裸图标变淡/变灰）。 */
  * { -webkit-tap-highlight-color: transparent; }

  /* 头部：居中标题 + 电脑名/状态副标题（对标官方 App 首页） */
  header { position: sticky; top: 0; z-index: 30; background: var(--raised); padding: 6px 12px;
           display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border);
           min-height: 52px; }
  #hmid { flex: 1; min-width: 0; text-align: center; cursor: pointer; user-select: none; }
  header h1 { font-size: 16px; margin: 0; line-height: 1.3;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #chev { display: none; color: var(--dim); font-size: 12px; margin-left: 5px; }
  #chev.show { display: inline; }
  /* 返回：无背景的图标按钮，尺寸与右侧「新建会话」（#newsess）呼应 */
  #back { flex: none; width: 36px; height: 36px; margin-left: -6px; border: none;
          background: none; color: var(--text); cursor: pointer; padding: 0;
          align-items: center; justify-content: center; }
  #back:active { color: var(--dim); }
  #back svg { width: 26px; height: 26px; }
  #status { display: block; font-size: 12px; line-height: 1.3; color: var(--dim);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #status::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%;
                    background: var(--dim); margin-right: 5px; vertical-align: 1px; }
  #status.online { color: var(--dim); }
  #status.online::before { background: var(--ok); }
  #status.warn { color: var(--warn); }
  #status.warn::before { background: var(--warn); }
  #status.down { color: var(--err); }
  #status.down::before { background: var(--err); }
  #menubtn { flex: none; width: 36px; height: 36px; border: none; border-radius: 50%;
             background: var(--sunken); color: var(--text); font-size: 18px; line-height: 1;
             cursor: pointer; padding: 0; }
  #menubtn:active { background: var(--border); }
  body.insession #menubtn, body:not(.paired) #menubtn { display: none; }
  /* 会话视图右上角：在当前会话同目录新建会话（与 #menubtn 互斥占位）*/
  #newsess { flex: none; width: 36px; height: 36px; border: none; border-radius: 50%;
             background: none; color: var(--text); cursor: pointer; padding: 0;
             display: none; align-items: center; justify-content: center; }
  #newsess:active { color: var(--dim); }
  #newsess svg { width: 21px; height: 21px; }
  body.insession #newsess { display: flex; }
  /* ⋯ 菜单：组织方式 + 管理 */
  #topmenu { display: none; position: fixed; right: 10px; top: 58px; z-index: 45;
             background: var(--raised); border: 1px solid var(--border); border-radius: 16px;
             padding: 6px; min-width: 210px; box-shadow: 0 10px 32px rgba(0,0,0,.35); }
  #topmenu.open { display: block; }
  #topmenu .mlabel { font-size: 12px; color: var(--dim); padding: 8px 14px 2px; }
  #topmenu button { display: flex; align-items: center; gap: 12px; width: 100%; border: none;
                    background: none; color: var(--text); font-size: 15px; padding: 12px 14px;
                    border-radius: 10px; cursor: pointer; text-align: left; }
  #topmenu button:active { background: var(--sunken); }
  #topmenu button svg { flex: none; }
  #topmenu .mck { margin-left: auto; color: var(--accent); }
  #topmenu hr { border: none; border-top: 1px solid var(--border); margin: 6px 8px; }

  /* 底部弹层（切换电脑 / 选择目录共用） */
  .sheet { display: none; position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.5); }
  .sheet.open { display: block; }
  .sheetbox { position: absolute; left: 0; right: 0; bottom: 0; background: var(--raised);
              border-radius: 14px 14px 0 0; padding: 14px 16px calc(20px + env(safe-area-inset-bottom));
              max-width: 760px; margin: 0 auto; max-height: 70vh; overflow-y: auto; }
  .sheethead { font-size: 13px; color: var(--dim); margin-bottom: 10px; letter-spacing: 1px; }
  .drow { display: flex; align-items: center; gap: 10px; padding: 12px 10px; border-radius: 10px;
          cursor: pointer; }
  .drow:active { background: var(--sunken); }
  /* 选中态一律走 accent；绿色只表示在线/运行中/成功 */
  .drow.active { background: var(--accent-bg); }
  .drow .dname { flex: 1; min-width: 0; }
  .drow .dico { flex: none; width: 22px; height: 22px; color: var(--dim); }
  .drow.active .dico { color: var(--text); }
  .drow .dico svg { width: 22px; height: 22px; display: block; }
  .drow .dsub { font-size: 12px; color: var(--dim); white-space: nowrap; overflow: hidden;
                text-overflow: ellipsis; }
  .drow .dsub.wrap { white-space: normal; }
  .drow .ddot.ok { background: var(--ok); }
  .drow .ddot.warn { background: var(--warn); }
  .drow .ddot.down { background: var(--err); }
  .drow .dcur { font-size: 11px; color: var(--accent); }
  .drow .ddel { flex: none; border: none; background: none; color: var(--dim);
                font-size: 14px; padding: 6px 8px; cursor: pointer; }
  .sheetnote { font-size: 12px; color: var(--dim); padding: 10px 10px 0; line-height: 1.6; }
  .drow .ddot { flex: none; width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .drow.active .ddot { background: var(--ok); }

  main { padding: 12px 16px 40px; max-width: 760px; margin: 0 auto; }
  .notice { text-align: center; color: var(--dim); padding: 30px 10px; }
  /* sticky：长会话滚到底部时报错（发送失败等）也要看得见 */
  #toast { position: fixed; left: 50%; bottom: 96px; transform: translateX(-50%) translateY(6px);
           max-width: 80%; background: rgba(0,0,0,.82); color: #fff; padding: 8px 16px;
           border-radius: 20px; font-size: 13px; white-space: nowrap; z-index: 60;
           opacity: 0; pointer-events: none; transition: opacity .18s, transform .18s; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .banner { position: sticky; top: 53px; z-index: 19; background: var(--warn-bg);
            border: 1px solid var(--warn-border); color: var(--warn);
            padding: 8px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 10px; display: none; }
  .banner.action { cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  /* 未配对引导页 */
  .onboard { padding: 28px 6px; max-width: 480px; margin: 0 auto; }
  .onboard h2 { font-size: 22px; margin: 0 0 8px; }
  .onboard p { color: var(--dim); margin: 8px 0; }
  .onboard ol { margin: 16px 0; padding-left: 24px; }
  .onboard li { margin: 10px 0; }
  .onboard code { font-family: ui-monospace, monospace; font-size: 12px; background: var(--sunken);
                  border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; }
  .obdim { font-size: 12.5px; }

  /* —— 列表页：状态看板 —— */
  #headline { font-size: 20px; font-weight: 700; line-height: 1.4; margin: 6px 2px 16px; }
  #headline.warn { color: var(--warn); }
  #headline .sub { display: block; font-size: 13px; font-weight: 400; color: var(--dim); margin-top: 2px; }
  .secthead { font-size: 12px; color: var(--dim); margin: 18px 2px 8px; letter-spacing: 1px; }
  .row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; margin-bottom: 8px;
         background: var(--raised); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; }
  .row:active { background: var(--sunken); }
  .row.appr { border-color: var(--warn-border); background: var(--warn-bg); }
  .dot { flex: none; width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
  .dot.run { background: var(--ok); animation: pulse 1.2s ease-in-out infinite; }
  .dot.appr { background: var(--warn); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  .rowmain { flex: 1; min-width: 0; }
  .rowtitle { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rowsnip { font-size: 13px; color: var(--dim); margin-top: 2px;
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rowsub { font-size: 12px; color: var(--dim); margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rowsub .st { font-weight: 600; }
  .rowsub .st.run { color: var(--ok); }
  .rowsub .st.appr { color: var(--warn); }
  /* 按项目分组（cwd 聚合）：项目头行可折叠，右侧图标在该项目下新建会话 */
  .proj { display: flex; align-items: center; gap: 10px; padding: 12px 4px; cursor: pointer;
          user-select: none; }
  .proj svg { flex: none; color: var(--text); }
  .pname { min-width: 0; font-size: 17px; font-weight: 700;
           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pchev { flex: none; color: var(--dim); font-size: 11px; }
  .pnew { margin-left: auto; flex: none; border: none; background: none; color: var(--text);
          padding: 6px; cursor: pointer; line-height: 0; }
  .pnew:active { opacity: .5; }
  .row.inproj { background: none; border: none; margin-bottom: 0; padding: 10px 4px; }
  .row.inproj.appr { background: var(--warn-bg); border-radius: 10px; }

  /* —— 会话页：对话流 —— */
  #viewer { display: none; }
  #viewer.active { display: block; }
  /* 下拉加载更早历史的提示条：默认高 0，下拉时随手势撑高，松手回弹 */
  #pulltip { height: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 6px;
             color: var(--dim); font-size: 12px; transition: height .26s cubic-bezier(.22,.61,.36,1); }
  #pulltip.drag { transition: none; }
  #pulltip .arr { width: 15px; height: 15px; flex: none; opacity: .8;
                  transition: transform .2s ease; }
  #pulltip.ready .arr { transform: rotate(180deg); }
  #pulltip.end .arr { display: none; }
  #list.hidden { display: none; }
  .msg { margin: 14px 0; }
  .msg.user { display: flex; justify-content: flex-end; }
  .msg.user .bubble { background: var(--user-bubble); border-radius: 16px 16px 4px 16px;
                      padding: 9px 13px; max-width: 85%; white-space: pre-wrap; word-break: break-word; }
  .msg.pending { opacity: .55; }
  .msg.assistant { word-break: break-word; }

  /* markdown */
  .md > :first-child { margin-top: 0; }
  .md > :last-child { margin-bottom: 0; }
  .md p { margin: 8px 0; }
  .md h3, .md h4, .md h5, .md h6 { margin: 14px 0 6px; line-height: 1.4; }
  .md h3 { font-size: 17px; } .md h4 { font-size: 16px; } .md h5, .md h6 { font-size: 15px; }
  .md ul, .md ol { margin: 8px 0; padding-left: 22px; }
  .md li { margin: 3px 0; }
  .md code { font-family: ui-monospace, monospace; font-size: 13px; background: var(--sunken);
             border: 1px solid var(--border); border-radius: 5px; padding: 1px 5px; overflow-wrap: anywhere; }
  .md pre { background: var(--sunken); border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 12px; overflow-x: auto; margin: 10px 0; }
  .md pre code { background: none; border: none; padding: 0; font-size: 12.5px; line-height: 1.5;
                 white-space: pre; word-break: normal; }
  .md blockquote { margin: 8px 0; padding: 2px 12px; border-left: 3px solid var(--border); color: var(--dim); }
  .md a { color: var(--accent); }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .morelink { display: block; background: none; border: none; color: var(--accent);
              font-size: 13px; padding: 6px 0; cursor: pointer; }
  .md table { border-collapse: collapse; margin: 10px 0; font-size: 13px;
              display: block; overflow-x: auto; max-width: 100%; }
  .md th, .md td { border: 1px solid var(--border); padding: 4px 9px; text-align: left; }
  .md th { background: var(--sunken); }
  /* 会话内图片（imageRef 分块拉取） */
  .imgbox { border: 1px solid var(--border); border-radius: 10px; background: var(--sunken);
            color: var(--dim); font-size: 12px; padding: 12px; margin: 10px 0;
            text-align: center; min-height: 44px; }
  .imgbox img { max-width: 100%; border-radius: 8px; display: block; margin: 0 auto; }
  .msg.user .imgbox { max-width: 85%; }
  /* 首页底栏：搜索胶囊 + 新会话按钮（对标官方 App 的 Search Chats / Chat） */
  #homebar { display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
             gap: 10px; max-width: 760px; margin: 0 auto;
             padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
             background: var(--bg); }
  body.paired:not(.insession) #homebar { display: flex; }
  #search { flex: 1; min-width: 0; background: var(--raised); border: 1px solid var(--border);
            border-radius: 24px; padding: 11px 18px; font: inherit; font-size: 16px;
            color: var(--text); }
  #search:focus { outline: none; border-color: var(--accent); }
  #newchat { flex: none; display: flex; align-items: center; gap: 7px; border: none;
             border-radius: 24px; padding: 0 18px; background: var(--text); color: var(--bg);
             font-size: 15px; font-weight: 600; cursor: pointer; }
  #newchat:active { opacity: .8; }
  body.paired:not(.insession) main { padding-bottom: 96px; }

  /* 工具调用（命令 / MCP 工具 / 文件改动）：折叠行 */
  .tool { border: 1px solid var(--border); background: var(--raised); border-radius: 10px;
          margin: 10px 0; overflow: hidden; }
  .tool-head { display: flex; align-items: center; gap: 8px; padding: 8px 12px;
               font: 12.5px/1.5 ui-monospace, monospace; color: var(--dim); cursor: pointer; }
  .tool-head .tchev { flex: none; font-size: 10px; transition: transform .15s; }
  .tool.open .tchev { transform: rotate(90deg); }
  .tool-head .tcmd { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tool-head .tstat { flex: none; font-size: 11px; }
  .tool-head .tstat.ok { color: var(--ok); }
  .tool-head .tstat.err { color: var(--err); }
  .tool-body { display: none; border-top: 1px solid var(--border); padding: 10px 12px;
               font: 12.5px/1.5 ui-monospace, monospace; white-space: pre-wrap; word-break: break-all;
               max-height: 50vh; overflow-y: auto; background: var(--sunken); }
  .tool.open .tool-body { display: block; }
  .tool-body .tout { display: none; border-top: 1px dashed var(--border);
                     margin-top: 8px; padding-top: 8px; }
  /* diff 着色 */
  .dfile { font-weight: 600; margin: 8px 0 3px; }
  .dfile:first-child { margin-top: 0; }
  .dl-add { color: var(--ok); }
  .dl-del { color: var(--err); }
  .dl-hunk { color: var(--dim); opacity: .8; }
  /* 流式草稿气泡：内容以 rollout tail 为准，delta 只做即时预览 */
  .msg.streaming .raw { white-space: pre-wrap; word-break: break-word; }
  .msg.streaming .cursor::after { content: "▍"; color: var(--accent);
                                  animation: pulse 1s ease-in-out infinite; }
  /* 回到底部 */
  #jump { display: none; position: fixed; right: 16px; bottom: calc(122px + env(safe-area-inset-bottom));
          width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border);
          background: var(--raised); color: var(--text); font-size: 16px; cursor: pointer;
          box-shadow: 0 2px 10px rgba(0,0,0,.3); z-index: 25; }
  #jump.show { display: block; }

  /* 会话页状态条 */
  #sstatus { display: none; position: sticky; top: 53px; z-index: 10; font-size: 13px; color: var(--ok);
             background: var(--ok-bg); border: 1px solid var(--border); border-radius: 8px;
             padding: 7px 12px; margin-bottom: 8px; }
  #sstatus.appr { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-border); }
  .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--ok);
           margin-right: 6px; animation: pulse 1.2s ease-in-out infinite; vertical-align: 1px; }

  /* 审批卡片：对话流内嵌 + 全局置顶共用 */
  #approvals { position: sticky; top: 53px; z-index: 20; max-width: 760px; margin: 0 auto;
               padding: 0 16px; max-height: 45vh; overflow-y: auto; }
  .trunc { text-align: center; color: var(--dim); font-size: 12px; margin: 12px 0; }
  .approval { background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: 12px;
              padding: 12px 14px; margin: 10px 0; box-shadow: 0 4px 16px rgba(0,0,0,.25); }
  .approval .atitle { color: var(--warn); font-weight: 600; margin-bottom: 6px; font-size: 14px; }
  .approval .acmd { font-family: ui-monospace, monospace; font-size: 13px; background: var(--sunken);
                    border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px;
                    white-space: pre-wrap; word-break: break-all; max-height: 40vh; overflow-y: auto; }
  .approval .acmd.danger { border-color: var(--err); }
  .approval .acwd { font-size: 12px; color: var(--dim); margin-top: 6px;
                    font-family: ui-monospace, monospace; word-break: break-all; }
  .approval .adanger { font-size: 12px; color: var(--err); margin-top: 6px; }
  .approval .abtns { display: flex; gap: 10px; margin-top: 10px; }
  .approval .abtns button { flex: 1; border: none; border-radius: 8px; padding: 10px; cursor: pointer; }
  .approval .ayes { background: var(--ok); color: #fff; }
  .approval .ano { background: none; border: 1px solid var(--border); color: var(--text); }
  .approval .aall { display: block; width: 100%; background: none; border: none; color: var(--ok);
                    font-size: 13px; margin-top: 4px; padding: 8px; cursor: pointer; }

  /* 底部输入区：一体化卡片（输入行在上，操作排在下） */
  #composer { display: none; position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
              background: var(--bg);
              padding: 6px 10px calc(10px + env(safe-area-inset-bottom)); }
  #composer.active { display: block; }
  .chip { flex: none; border: 1px solid var(--border); background: var(--raised); color: var(--text);
          border-radius: 15px; padding: 5px 13px; font-size: 13px; cursor: pointer; }
  .chip:active { background: var(--border); }
  #card { background: var(--raised); border: 1px solid var(--border); border-radius: 22px;
          padding: 10px 10px 8px 14px; max-width: 760px; margin: 0 auto;
          box-shadow: 0 4px 18px rgba(0,0,0,.18); }
  #attachrow { display: none; gap: 10px; padding: 2px 0 10px; overflow-x: auto;
               scrollbar-width: none; }
  #attachrow.on { display: flex; }
  .att { position: relative; flex: none; padding: 6px 6px 0 0; }
  .att img { width: 56px; height: 56px; object-fit: cover; border-radius: 10px;
             border: 1px solid var(--border); display: block; }
  .att button { position: absolute; top: 0; right: 0; width: 20px; height: 20px;
                border-radius: 50%; border: none; background: var(--text); color: var(--bg);
                font-size: 11px; line-height: 20px; padding: 0; cursor: pointer; }
  #input { display: block; width: 100%; resize: none; background: none; color: var(--text);
           border: none; padding: 2px 4px 8px 0; font: inherit; font-size: 16px;
           line-height: 1.4; min-height: 33px; scrollbar-width: none; }
           /* 16px 起步：iOS 对更小的输入框字号会聚焦自动放大页面 */
  #input::-webkit-scrollbar { display: none; }
  #input:focus { outline: none; }
  .crow { display: flex; gap: 8px; align-items: center; }
  #attach { flex: none; width: 34px; height: 34px; cursor: pointer;
            border: none; background: none; color: var(--text);
            font-size: 22px; line-height: 1; padding: 0; }
  #attach:active { opacity: .5; }
  /* ➕ 动作菜单：锚在输入卡片左上方的浮层（对标 Claude App 的加号菜单） */
  #plusmenu { display: none; position: absolute; left: 12px; bottom: calc(100% + 4px);
              z-index: 35; background: var(--raised); border: 1px solid var(--border);
              border-radius: 16px; padding: 6px; min-width: 190px;
              box-shadow: 0 10px 32px rgba(0,0,0,.35); }
  #plusmenu.open { display: block; }
  #plusmenu button { display: flex; align-items: center; gap: 12px; width: 100%; border: none;
                     background: none; color: var(--text); font-size: 15px; padding: 12px 14px;
                     border-radius: 10px; cursor: pointer; text-align: left; }
  #plusmenu button:active { background: var(--sunken); }
  #plusmenu .mic { flex: none; width: 18px; height: 18px; color: var(--dim); }
  #plusmenu .mic svg { width: 18px; height: 18px; display: block; }
  #plusmenu .mck { margin-left: auto; color: var(--accent); }
  /* 操作排走官方 App 的裸排版：加号/图标/文字不带按钮圈，只有发送/停止是实心圆 */
  .obtn { flex: none; max-width: 148px; overflow: hidden; text-overflow: ellipsis;
          white-space: nowrap; border: none; background: none; color: var(--dim);
          padding: 8px 3px; font-size: 13px; line-height: 1; cursor: pointer; }
  .obtn:active { opacity: .5; }
  .obtn.set { color: var(--text); }
  .obtn.warn { color: var(--err); }
  .obtn.ico { padding: 5px 3px; }
  .obtn.ico svg { width: 21px; height: 21px; display: block; }
  #planpill { color: var(--accent); }
  /* 模型：版本号亮色，力度灰色（对标官方"5.5 Extra High"） */
  #modelbtn { color: var(--text); font-size: 15px; font-weight: 600; }
  #modelbtn .msub { color: var(--dim); font-weight: 400; }
  #modelbtn.ph { color: var(--dim); font-weight: 400; font-size: 13px; }
  .chip.sel { border-color: var(--accent); color: var(--accent); }
  .effrow { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 10px 8px; }
  #runhint { display: none; font-size: 12px; color: var(--dim); min-width: 0;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sp { flex: 1; }
  #send, #stop { flex: none; width: 34px; height: 34px; border: none; border-radius: 50%;
                 cursor: pointer; font-size: 16px; line-height: 1; }
  /* 发送与首页「新会话」同一套反色单色，主操作只有一种颜色语言 */
  #send { background: var(--text); color: var(--bg); }
  #send:disabled { opacity: .35; cursor: default; }
  #stop { background: var(--err); color: #fff; font-size: 11px; display: none; }
  #stop:disabled { opacity: .5; }
  /* 乐观气泡的附图与排队标注 */
  .echocol { max-width: 85%; display: flex; flex-direction: column; align-items: flex-end; }
  .echoimgs { display: flex; gap: 6px; justify-content: flex-end; margin-bottom: 4px; }
  .echoimgs img { width: 72px; height: 72px; object-fit: cover; border-radius: 10px;
                  border: 1px solid var(--border); }
  .qtag { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .msg.queued { opacity: .8; cursor: pointer; }
</style>
</head>

<script type="module">
const $ = (id) => document.getElementById(id);
const enc = new TextEncoder();
const b64 = {
  to: (buf) => btoa(String.fromCharCode(...new Uint8Array(buf))),
  from: (str) => Uint8Array.from(atob(str.replace(/-/g, "+").replace(/_/g, "/")), (c) => c.charCodeAt(0)),
};
const AAD_C2D = enc.encode("czr1:c2d");
const AAD_D2C = enc.encode("czr1:d2c");
const APP_PROTOCOL = 1; // 应用层协议版本，与 daemon 交换（见 PROTOCOL.md §5）

// —— 多电脑存储：czr-daemons = { [id]: {relay,id,pk,name,deviceToken} }，czr-active = id ——
function loadStore() {
  let daemons = {};
  try { daemons = JSON.parse(localStorage.getItem("czr-daemons") || "{}"); } catch {}
  // 兼容旧版单电脑存储
  if (!Object.keys(daemons).length) {
    try {
      const old = JSON.parse(localStorage.getItem("czr-daemon") || "null");
      if (old?.id) { daemons[old.id] = old; localStorage.setItem("czr-daemons", JSON.stringify(daemons)); }
    } catch {}
  }
  return daemons;
}
function listDaemons() {
  return Object.values(loadStore());
}
function saveDaemon(info) {
  const daemons = loadStore();
  daemons[info.id] = { relay: info.relay, id: info.id, pk: info.pk, name: info.name, deviceToken: info.deviceToken };
  localStorage.setItem("czr-daemons", JSON.stringify(daemons));
  localStorage.setItem("czr-active", info.id);
}
function setActiveDaemon(id) { localStorage.setItem("czr-active", id); }

// 决定本次要连接的电脑：配对码优先 -> 上次活跃 -> 列表第一个
function loadDaemonInfo() {
  const hash = new URLSearchParams(location.hash.slice(1));
  if (hash.get("d")) {
    // 永久链接：内嵌长期设备令牌，自包含，不依赖 localStorage（微信清存储/重复点也能连）
    const payload = JSON.parse(new TextDecoder().decode(b64.from(hash.get("d"))));
    history.replaceState(null, "", location.pathname); // 凭据移出地址栏（聊天记录里的原链接仍完整，故重复点可用）
    return { ...payload, deviceToken: payload.dtok, fromPair: false };
  }
  if (hash.get("p")) {
    const payload = JSON.parse(new TextDecoder().decode(b64.from(hash.get("p"))));
    history.replaceState(null, "", location.pathname); // 配对码不留在地址栏
    return { ...payload, fromPair: true };
  }
  const daemons = loadStore();
  const active = localStorage.getItem("czr-active");
  if (active && daemons[active]) return daemons[active];
  const first = Object.values(daemons)[0];
  return first || null;
}

// —— 纯 JS X25519 后备（RFC 7748，BigInt）——
// 国内安卓浏览器 / 微信内核普遍不支持 WebCrypto 的 X25519（Chrome 133+ 才默认开启），
// 原生不可用时自动降级到此实现（已与 node:crypto 官方实现交叉验证）。
const P = 2n ** 255n - 19n;
const A24 = 121665n;
function leToBig(bytes) {
  let n = 0n;
  for (let i = bytes.length - 1; i >= 0; i--) n = (n << 8n) | BigInt(bytes[i]);
  return n;
}
function bigToLe(n, len) {
  const out = new Uint8Array(len);
  for (let i = 0; i < len; i++) { out[i] = Number(n & 0xffn); n >>= 8n; }
  return out;
}
function modPow(base, exp, mod) {
  let result = 1n; base %= mod;
  while (exp > 0n) {
    if (exp & 1n) result = result * base % mod;
    base = base * base % mod; exp >>= 1n;
  }
  return result;
}
function x25519Js(scalarBytes, uBytes) {
  const s = Uint8Array.from(scalarBytes);
  s[0] &= 248; s[31] &= 127; s[31] |= 64;
  const k = leToBig(s);
  const u = Uint8Array.from(uBytes); u[31] &= 127;
  const x1 = leToBig(u) % P;
  let x2 = 1n, z2 = 0n, x3 = x1, z3 = 1n, swap = 0n;
  for (let t = 254; t >= 0; t--) {
    const kt = (k >> BigInt(t)) & 1n;
    swap ^= kt;
    if (swap) { [x2, x3] = [x3, x2]; [z2, z3] = [z3, z2]; }
    swap = kt;
    const a = (x2 + z2) % P, aa = a * a % P;
    const b = (x2 - z2 + P) % P, bb = b * b % P;
    const e = (aa - bb + P) % P;
    const c = (x3 + z3) % P, d = (x3 - z3 + P) % P;
    const da = d * a % P, cb = c * b % P;
    x3 = (da + cb) % P; x3 = x3 * x3 % P;
    z3 = (da - cb + P) % P; z3 = z3 * z3 % P; z3 = z3 * x1 % P;
    x2 = aa * bb % P;
    z2 = e * ((aa + A24 * e) % P) % P;
  }
  if (swap) { [x2, x3] = [x3, x2]; [z2, z3] = [z3, z2]; }
  return bigToLe(x2 * modPow(z2, P - 2n, P) % P, 32);
}
const BASE9 = (() => { const b = new Uint8Array(32); b[0] = 9; return b; })();

// 协商共享密钥：原生 X25519 优先，失败降级纯 JS
async function x25519Shared(daemonPubRaw) {
  try {
    const eph = await crypto.subtle.generateKey({ name: "X25519" }, false, ["deriveBits"]);
    const pub = await crypto.subtle.importKey("raw", daemonPubRaw, { name: "X25519" }, false, []);
    const shared = new Uint8Array(await crypto.subtle.deriveBits({ name: "X25519", public: pub }, eph.privateKey, 256));
    const ephPubRaw = new Uint8Array(await crypto.subtle.exportKey("raw", eph.publicKey));
    return { shared, ephPubRaw };
  } catch {
    const priv = crypto.getRandomValues(new Uint8Array(32));
    return { shared: x25519Js(priv, daemonPubRaw), ephPubRaw: x25519Js(priv, BASE9) };
  }
}

// HKDF-SHA256：原生 HKDF 优先，失败降级 HMAC 手动展开（输出 32 字节，单块足够）
async function hkdfAesKey(shared, daemonInfo) {
  const salt = enc.encode(daemonInfo.id);
  const info = enc.encode("codex-zh-remote-v1");
  try {
    const hk = await crypto.subtle.importKey("raw", shared, "HKDF", false, ["deriveKey"]);
    return await crypto.subtle.deriveKey(
      { name: "HKDF", hash: "SHA-256", salt, info },
      hk, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"],
    );
  } catch {
    const saltKey = await crypto.subtle.importKey("raw", salt, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
    const prk = new Uint8Array(await crypto.subtle.sign("HMAC", saltKey, shared));
    const prkKey = await crypto.subtle.importKey("raw", prk, { name: "HMAC", hash: "SHA-256" }, false, ["sign"]);
    const input = new Uint8Array(info.length + 1);
    input.set(info, 0); input[info.length] = 1;
    const okm = new Uint8Array(await crypto.subtle.sign("HMAC", prkKey, input)).subarray(0, 32);
    return await crypto.subtle.importKey("raw", okm, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
  }
}

async function deriveKey(daemonInfo) {
  if (!crypto?.subtle) throw new Error("此浏览器不支持 WebCrypto（需 HTTPS 环境与较新内核）");
  const { shared, ephPubRaw } = await x25519Shared(b64.from(daemonInfo.pk));
  if (shared.every((byte) => byte === 0)) throw new Error("密钥协商失败");
  const key = await hkdfAesKey(shared, daemonInfo);
  return { key, ephPubRaw };
}

// 连接管理：自动重连（指数退避）+ 重鉴权，断线对上层透明。
// 活性分层：前台每 25s 发 relay 层心跳（边缘自动应答，不进 DO 不出 daemon），
// 上一拍没回即判僵尸重建——iOS 切网/锁屏后 socket 常死而 readyState 仍是 OPEN，
// onclose 可能几分钟不来，不能等它。旧 relay 不认识 hb 会静默忽略，
// 因此收到过第一个 pong 才启用僵尸判定（能力探测，两种 relay 形态平滑升级）。
const HB_FRAME = '{"t":"hb"}'; // 与 relay 边缘自动应答的匹配串逐字一致，不能重排/加空格
const PING_MS = 25000;
const HB_VERIFY_MS = 5000;

// 从 UA 解读一个便于识别的设备短标签（如「iPhone · 微信」），鉴权时发给电脑端，
// 让「已配对设备」页显示可读名字而非随机 ID。纯启发式、失败即返回空串（不阻断鉴权）。
function deviceLabel() {
  try {
    const ua = navigator.userAgent || "";
    let os = "";
    if (/iPhone/i.test(ua)) os = "iPhone";
    else if (/iPad/i.test(ua)) os = "iPad";
    else if (/Android/i.test(ua)) os = "Android";
    else if (/Macintosh|Mac OS X/i.test(ua)) os = "Mac";
    else if (/Windows/i.test(ua)) os = "Windows";
    else if (/Linux/i.test(ua)) os = "Linux";
    else os = navigator.userAgentData?.platform || "设备";
    let app = "";
    if (/MicroMessenger/i.test(ua)) app = "微信";
    else if (/\bQQ\/|QQBrowser/i.test(ua)) app = "QQ";
    else if (/Edg[A-Z]?\//i.test(ua)) app = "Edge";
    else if (/CriOS|Chrome\//i.test(ua)) app = "Chrome";
    else if (/FxiOS|Firefox\//i.test(ua)) app = "Firefox";
    else if (/Safari\//i.test(ua)) app = "Safari";
    return app ? `${os} · ${app}` : os;
  } catch { return ""; }
}

class Session {
  constructor(daemonInfo) {
    this.info = daemonInfo;
    this.pendingRequests = new Map();
    this.nextId = 1;
    this.firstFrame = true;
    this.closedByUser = false;
    this.dead = false;          // 终态：令牌被撤销/失效，永不再重连
    this.reconnectAttempt = 0;
    this.reconnectTimer = null;
    this.connEpoch = 0;         // 连接代次：过期尝试的回调/失败一律作废，防新旧 socket 互踩
    this.hbSupported = false;   // relay 是否应答 hb（收到首个 pong 后置真）
    this.lastPong = 0;
    this.lastPingAt = 0;
    this.pingTimer = null;
    this.onNotify = () => {};
    this.onStatus = () => {};   // (patch) 链路状态增量：{link?, daemon?, lastSeen?}
    this.onReady = () => {};    // 每次（重）鉴权成功后回调，供上层重拉/重watch
    this.onAuthFail = () => {};  // 令牌被撤销/失效（403）：终态回调，上层停重连并引导重配对
  }

  async start() {
    this.closedByUser = false;
    await this.#openAndAuth();
  }

  async #openAndAuth() {
    // 领一个新代次并顶掉旧连接：旧 socket 的回调按代次作废，
    // 否则鉴权超时后旧连接迟到的 onclose 会误杀新连接的 pending、叠加第二个重连
    const epoch = ++this.connEpoch;
    const stale = this.ws;
    this.ws = null;
    if (stale) try { stale.close(); } catch {}
    try {
      const { key, ephPubRaw } = await deriveKey(this.info);
      if (this.connEpoch !== epoch) return; // 已被更新的尝试顶掉
      this.key = key;
      this.ephPubRaw = ephPubRaw;
      this.firstFrame = true;
      const ws = new WebSocket(`${this.info.relay.replace(/\/$/, "")}/v1/client/${this.info.id}`);
      this.ws = ws;
      await new Promise((ok, bad) => {
        ws.onopen = ok;
        ws.onerror = () => bad(new Error("无法连接中继"));
        ws.onclose = () => bad(new Error("无法连接中继"));
      });
      if (this.connEpoch !== epoch) { try { ws.close(); } catch {} return; }
      ws.onmessage = (e) => { if (this.connEpoch === epoch) this.onFrame(JSON.parse(e.data)); };
      ws.onclose = () => { if (this.connEpoch === epoch) this.#onClose(); };
      // 首次用配对码，之后一律用设备令牌；带上本端协议版本
      const authParams = this.info.fromPair
        ? { pairToken: this.info.tok, protocol: APP_PROTOCOL, name: deviceLabel() }
        : { deviceToken: this.info.deviceToken, protocol: APP_PROTOCOL, name: deviceLabel() };
      let auth;
      try {
        auth = await this.request("auth", authParams);
      } catch (err) {
        if (this.connEpoch !== epoch) return;
        // 403=配对码失效 / 设备令牌被电脑端撤销：重试也永远失败，转终态而非无限重连
        if (err.code === 403) {
          this.dead = true;
          this.stopPing();
          try { this.ws?.close(); } catch {}
          this.onAuthFail(err);
          return;
        }
        throw err;
      }
      if (this.connEpoch !== epoch) return;
      if (auth.deviceToken) {
        this.info = { ...this.info, fromPair: false, deviceToken: auth.deviceToken, name: auth.daemonName };
        saveDaemon(this.info); // 配对成功即入库并设为活跃
      }
      // 电脑端协议更新：PWA 可能缓存了旧代码。装到主屏幕后没有"下拉刷新"，
      // 横幅本身就是刷新按钮
      if (auth.protocol > APP_PROTOCOL) {
        setTimeout(() => showBanner("电脑端 Remote 已更新，点这里刷新页面", () => location.reload()), 0);
      }
      this.reconnectAttempt = 0;
      this.startPing();
      this.onReady(auth);
    } catch (err) {
      if (this.connEpoch !== epoch) return; // 过期尝试的失败静默丢弃，不再触发重连
      throw err;
    }
  }

  #onClose() {
    if (this.reconnectTimer) return; // 已有重连排队，避免关闭事件与失败回调重复调度
    this.stopPing();
    for (const [, p] of this.pendingRequests) p.reject(new Error("连接断开"));
    this.pendingRequests.clear();
    if (this.closedByUser || this.dead) return; // 令牌终态：主动 close 触发的 onclose 不再排重连
    // 页面不在前台就不排重连：后台无限退避重试违背"不可见即零活动"，
    // 回前台时 ensureAlive 会立即重连（iOS 冻结页面，安卓/桌面后台标签页则真会跑）
    if (document.visibilityState !== "visible") {
      this.onStatus({ link: "down" });
      return;
    }
    // 首跳 300ms：偶发抖断几乎无感；之后指数退避
    const delay = this.reconnectAttempt === 0 ? 300 : Math.min(1000 * 2 ** this.reconnectAttempt, 15000);
    this.reconnectAttempt += 1;
    this.onStatus({ link: "down" });
    this.reconnectTimer = setTimeout(() => {
      this.reconnectTimer = null;
      this.#openAndAuth().catch(() => this.#onClose());
    }, delay);
  }

  // —— 前台心跳：只在页面可见时跑，切后台/锁屏即停（零后台流量）——
  startPing() {
    this.stopPing();
    if (this.closedByUser || this.dead || document.visibilityState !== "visible") return;
    if (this.ws?.readyState !== WebSocket.OPEN) return;
    this.#sendHb(); // 立即发一拍：既是能力探测也刷新 lastPong 基线
    this.pingTimer = setInterval(() => {
      if (this.ws?.readyState !== WebSocket.OPEN) return;
      if (this.hbSupported && this.lastPong < this.lastPingAt) {
        this.#rebuild(); // 上一拍没回：readyState 说 OPEN 也不信
        return;
      }
      this.#sendHb();
    }, PING_MS);
  }

  stopPing() {
    if (this.pingTimer) clearInterval(this.pingTimer);
    this.pingTimer = null;
  }

  #sendHb() {
    this.lastPingAt = Date.now();
    try { this.ws.send(HB_FRAME); } catch { this.#rebuild(); }
  }

  // 僵尸连接强制重建：摘掉旧 socket 的回调避免二次触发，立刻重开
  #rebuild() {
    const ws = this.ws;
    if (ws) { ws.onclose = null; ws.onmessage = null; try { ws.close(); } catch {} }
    this.ws = null;
    this.stopPing();
    for (const [, p] of this.pendingRequests) p.reject(new Error("连接断开"));
    this.pendingRequests.clear();
    if (this.closedByUser || this.dead) return;
    this.onStatus({ link: "connecting" });
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  // 回到前台/网络恢复时调用：断了立即重连；看似 OPEN 也要验活（iOS 僵尸 socket）
  ensureAlive() {
    if (this.closedByUser || this.dead) return;
    if (this.reconnectTimer) {
      clearTimeout(this.reconnectTimer);
      this.reconnectTimer = null;
    }
    if (this.ws?.readyState === WebSocket.OPEN) {
      this.startPing(); // 重启前台心跳（切后台时停了）
      if (this.hbSupported) {
        const sentAt = Date.now();
        const ws = this.ws;
        try { ws.send(HB_FRAME); } catch { this.#rebuild(); return; }
        setTimeout(() => {
          // 只裁决当时探测的那条连接；期间已重建/切后台则不动（避免误杀新连接、后台重连）
          if (this.closedByUser || this.ws !== ws) return;
          if (document.visibilityState !== "visible") return;
          if (ws.readyState === WebSocket.OPEN && this.lastPong < sentAt) this.#rebuild();
        }, HB_VERIFY_MS);
      }
      return;
    }
    this.reconnectAttempt = 0;
    this.#openAndAuth().catch(() => this.#onClose());
  }

  async onFrame(frame) {
    if (frame.t === "hb") {
      this.hbSupported = true;
      this.lastPong = Date.now();
      return;
    }
    if (frame.t === "status") {
      this.onStatus({ link: "ok", daemon: frame.online, lastSeen: frame.lastSeen ?? null });
      return;
    }
    if (frame.t !== "msg") return;
    const env = frame.data;
    const iv = b64.from(env.n);
    const data = b64.from(env.c);
    const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv, additionalData: AAD_D2C }, this.key, data);
    const msg = JSON.parse(new TextDecoder().decode(plain));
    if (msg.id !== undefined && this.pendingRequests.has(msg.id)) {
      const { resolve, reject } = this.pendingRequests.get(msg.id);
      this.pendingRequests.delete(msg.id);
      if (msg.error) {
        const e = new Error(msg.error.message);
        e.code = msg.error.code; // 保留状态码：403=令牌失效/被撤销，供上层判终态
        reject(e);
      } else resolve(msg.result);
    } else if (msg.method) {
      this.onNotify(msg);
    }
  }

  async send(payload) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const cipher = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: AAD_C2D }, this.key, enc.encode(JSON.stringify(payload)));
    const envelope = { n: b64.to(iv), c: b64.to(cipher) };
    if (this.firstFrame) {
      envelope.v = 1;
      envelope.k = b64.to(this.ephPubRaw);
      this.firstFrame = false;
    }
    this.ws.send(JSON.stringify({ t: "msg", data: envelope }));
  }

  request(method, params = {}, timeoutMs = 15000) {
    const id = this.nextId++;
    return new Promise((resolve, reject) => {
      this.pendingRequests.set(id, { resolve, reject });
      this.send({ id, method, params }).catch(reject);
      setTimeout(() => {
        if (this.pendingRequests.has(id)) {
          this.pendingRequests.delete(id);
          reject(new Error(`请求超时: ${method}`));
        }
      }, timeoutMs);
    });
  }
}

// —— rollout 条目渲染 ——
// 关键：codex 把每条逻辑消息写两遍——语义事件 `event_msg`（agent_message/
// user_message）+ OpenAI API 格式 `response_item`（message）。二者内容相同，
// 若都渲染就会重复（"两条收到"）。只认 event_msg 语义流，response_item 一律跳过。
function extractText(value, depth = 0) {
  if (depth > 4 || value == null) return "";
  if (typeof value === "string") return value;
  if (Array.isArray(value)) return value.map((v) => extractText(v, depth + 1)).filter(Boolean).join("\n");
  if (typeof value === "object") {
    for (const k of ["text", "message", "content", "command", "aggregated_output"]) {
      if (k in value) {
        const got = extractText(value[k], depth + 1);
        if (got) return got;
      }
    }
  }
  return "";
}

// —— rollout item -> 渲染指令 ——
// 对话正文认 event_msg（user_message/agent_message）；工具调用认 response_item
// （function_call + function_call_output 以 call_id 配对，这是现行 codex 记录命令
// 的唯一位置——event_msg 早已不含 exec_command_*，但保留旧格式兼容）。
// 返回值：null | {cls:"user"|"assistant", text}
//        | {cls:"tool", icon, label, detail, callId}   工具调用折叠行
//        | {cls:"toolout", callId, text, code}          工具输出（并入对应折叠行）
//        | {cls:"diff", files:[{path,kind,diff}], ok}   文件改动
const EXEC_NAME_RE = /exec|shell|bash|command/i;

function parseJson(str) {
  try { return JSON.parse(str ?? "{}") ?? {}; } catch { return {}; }
}

// GUI 版 exec 输出带 harness 前言（Chunk ID/Wall time/…/Output:），剥掉只留正文与退出码
function cleanExecOutput(raw) {
  const m = raw.match(/Process exited with code (\d+)/);
  const idx = raw.indexOf("Output:\n");
  if (!m && idx < 0) return { code: null, body: raw };
  return { code: m ? Number(m[1]) : null, body: idx >= 0 ? raw.slice(idx + 8).replace(/^---\n/, "") : raw };
}

function itemToBubble(item) {
  const t = item?.type;
  const p = item?.payload ?? {};
  // daemon 对超过 48KB 的单条做了截断保护：渲染占位而不是让消息凭空消失
  if (p.truncated) return { cls: "trunc" };
  if (t === "event_msg") {
    const pt = p.type;
    if (pt === "user_message" || pt === "agent_message") {
      const text = String(p.message ?? "").trim();
      return text ? { cls: pt === "user_message" ? "user" : "assistant", text } : null;
    }
    if (pt === "patch_apply_end") {
      const files = Object.entries(p.changes ?? {}).map(([path, c]) => ({
        path, kind: c?.type ?? "update", diff: String(c?.unified_diff ?? ""),
      }));
      return files.length ? { cls: "diff", files, ok: p.success !== false } : null;
    }
    if (pt === "web_search_end") {
      const q = String(p.query ?? "").trim();
      return q ? { cls: "tool", icon: "⌕", label: `搜索：${q}`, detail: q, callId: null } : null;
    }
    // 旧格式兼容：现行版本命令在 response_item 里，见到过 function_call 就跳过这两类避免重复
    if (pt === "exec_command_begin" && !app.sawFunctionCalls) {
      const cmd = Array.isArray(p.command) ? p.command.join(" ") : (p.command ?? "");
      return cmd ? { cls: "tool", icon: "$", label: cmd, detail: cmd, callId: p.call_id ?? null } : null;
    }
    if (pt === "exec_command_end" && !app.sawFunctionCalls) {
      const out = String(p.aggregated_output ?? p.stdout ?? "").trim();
      const code = p.exit_code ?? (p.success === false ? 1 : 0);
      return out || code ? { cls: "toolout", callId: p.call_id ?? null, text: out, code } : null;
    }
    return null; // task_started/token_count/mcp_tool_call_end（与 response_item 重复）等跳过
  }
  if (t === "response_item") {
    const pt = p.type;
    if (pt === "image_generation_call") {
      // 生成图：daemon 已把 base64 抽出缓存，这里只剩引用
      return p.imageRef ? { cls: "images", refs: [p.imageRef], user: false } : null;
    }
    if (pt === "message" && Array.isArray(p.content)) {
      // 文本部分与 event_msg 重复（跳过），但用户贴的图只存在于这里
      const refs = p.content.map((c) => c?.imageRef).filter(Boolean);
      if (refs.length) return { cls: "images", refs, user: p.role === "user" };
      return null;
    }
    if (pt === "function_call") {
      app.sawFunctionCalls = true;
      const args = parseJson(p.arguments);
      if (EXEC_NAME_RE.test(p.name ?? "")) {
        const cmd = args.cmd ?? args.command;
        const text = (Array.isArray(cmd) ? cmd.join(" ") : cmd) || "";
        return { cls: "tool", icon: "$", label: text || p.name,
                 detail: text || JSON.stringify(args, null, 2), callId: p.call_id ?? null };
      }
      return { cls: "tool", icon: "⚙", label: p.name || "工具调用",
               detail: JSON.stringify(args, null, 2), callId: p.call_id ?? null };
    }
    if (pt === "function_call_output" || pt === "custom_tool_call_output") {
      app.sawFunctionCalls = true;
      const raw = String(typeof p.output === "string" ? p.output : extractText(p.output)).trim();
      if (!raw) return null;
      const { code, body } = cleanExecOutput(raw);
      return { cls: "toolout", callId: p.call_id ?? null, text: body.trim() || raw, code };
    }
    if (pt === "custom_tool_call") {
      return { cls: "tool", icon: "⚙", label: p.name || "工具调用",
               detail: String(p.input ?? ""), callId: p.call_id ?? null };
    }
    return null; // message/reasoning（与 event_msg 重复或不外显）等跳过
  }
  if (["turn_context", "session_meta", "compacted"].includes(t)) return null;
  // 更老格式（无 event_msg）：回退通用提取，保持旧会话兼容
  const text = extractText(p ?? item).trim();
  if (!text) return null;
  const kind = `${t ?? ""}:${p?.type ?? ""}`;
  if (/user/i.test(kind)) return { cls: "user", text };
  if (/command|exec|shell/i.test(kind)) return { cls: "tool", icon: "$", label: text, detail: text, callId: null };
  if (/agent|assistant|message/i.test(kind)) return { cls: "assistant", text };
  return null; // 未知且非消息：不渲染，避免噪声
}

// —— 轻量 markdown 渲染（纯 DOM 构建，无 innerHTML，天然防注入）——
// 支持：段落、标题、无序/有序列表、围栏代码块、行内代码、粗体、链接、引用、分隔线。
function mdInline(text) {
  const frag = document.createDocumentFragment();
  const re = /(`[^`\n]+`)|(\*\*[^*\n]+\*\*)|\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g;
  let last = 0, m;
  while ((m = re.exec(text))) {
    if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
    if (m[1]) {
      const c = document.createElement("code");
      c.textContent = m[1].slice(1, -1);
      frag.appendChild(c);
    } else if (m[2]) {
      const b = document.createElement("strong");
      b.textContent = m[2].slice(2, -2);
      frag.appendChild(b);
    } else {
      const a = document.createElement("a");
      a.href = m[4]; a.textContent = m[3];
      a.target = "_blank"; a.rel = "noopener noreferrer";
      frag.appendChild(a);
    }
    last = re.lastIndex;
  }
  if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
  return frag;
}

function mdRender(text) {
  const root = document.createElement("div");
  root.className = "md";
  const lines = text.split("\n");
  const para = [];
  const flushPara = () => {
    if (!para.length) return;
    const p = document.createElement("p");
    para.forEach((l, idx) => {
      if (idx) p.appendChild(document.createElement("br"));
      p.appendChild(mdInline(l));
    });
    root.appendChild(p);
    para.length = 0;
  };
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (/^```/.test(line)) {
      flushPara();
      const buf = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) buf.push(lines[i++]);
      i++; // 跳过闭合围栏
      const pre = document.createElement("pre");
      const code = document.createElement("code");
      code.textContent = buf.join("\n");
      pre.appendChild(code);
      root.appendChild(pre);
      continue;
    }
    const h = line.match(/^(#{1,4})\s+(.*)/);
    if (h) {
      flushPara();
      // # -> h3 起步：对话流里不需要巨型标题
      const el = document.createElement(`h${Math.min(h[1].length + 2, 6)}`);
      el.appendChild(mdInline(h[2]));
      root.appendChild(el);
      i++;
      continue;
    }
    // 表格：| a | b | 行 + 紧随的 |---|---| 分隔行
    const sep = lines[i + 1] ?? "";
    if (/^\s*\|/.test(line) && /^\s*\|?[\s:|-]+\|?\s*$/.test(sep) && sep.includes("-")) {
      flushPara();
      const rows = [];
      while (i < lines.length && /^\s*\|/.test(lines[i])) rows.push(lines[i++]);
      const cells = (row) => row.replace(/^\s*\|/, "").replace(/\|\s*$/, "").split("|").map((c) => c.trim());
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      for (const c of cells(rows[0])) {
        const th = document.createElement("th");
        th.appendChild(mdInline(c));
        headRow.appendChild(th);
      }
      thead.appendChild(headRow);
      const tbody = document.createElement("tbody");
      for (const row of rows.slice(2)) {
        const tr = document.createElement("tr");
        for (const c of cells(row)) {
          const td = document.createElement("td");
          td.appendChild(mdInline(c));
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.append(thead, tbody);
      root.appendChild(table);
      continue;
    }
    const li = line.match(/^\s*([-*]|\d+[.、])\s+(.*)/);
    if (li) {
      flushPara();
      const listEl = document.createElement(/^\d/.test(li[1]) ? "ol" : "ul");
      while (i < lines.length) {
        const m2 = lines[i].match(/^\s*([-*]|\d+[.、])\s+(.*)/);
        if (!m2) break;
        const item = document.createElement("li");
        item.appendChild(mdInline(m2[2]));
        listEl.appendChild(item);
        i++;
      }
      root.appendChild(listEl);
      continue;
    }
    if (/^>\s?/.test(line)) {
      flushPara();
      const bq = document.createElement("blockquote");
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) buf.push(lines[i++].replace(/^>\s?/, ""));
      buf.forEach((l, idx) => {
        if (idx) bq.appendChild(document.createElement("br"));
        bq.appendChild(mdInline(l));
      });
      root.appendChild(bq);
      continue;
    }
    if (/^(---+|\*\*\*+)\s*$/.test(line)) { flushPara(); root.appendChild(document.createElement("hr")); i++; continue; }
    if (/^\s*$/.test(line)) { flushPara(); i++; continue; }
    para.push(line);
    i++;
  }
  flushPara();
  return root;
}

// —— 气泡构建 ——
const CLIP = 6000;
const clip = (text) => (text.length > CLIP ? `${text.slice(0, CLIP)}…` : text);

// 工具调用折叠行：头部一行摘要（图标 + 命令/工具名 + 状态角标），
// 点开看完整调用与输出。输出到达时经 attachToolOutput 按 call_id 并入。
function toolRow({ icon, label, detail, callId }) {
  const wrap = document.createElement("div");
  wrap.className = "tool";
  const head = document.createElement("div");
  head.className = "tool-head";
  const chev = document.createElement("span");
  chev.className = "tchev";
  chev.textContent = "▶";
  const cmd = document.createElement("span");
  cmd.className = "tcmd";
  cmd.textContent = `${icon} ${(label || "").split("\n")[0]}`;
  const stat = document.createElement("span");
  stat.className = "tstat";
  head.append(chev, cmd, stat);
  const body = document.createElement("div");
  body.className = "tool-body";
  const tin = document.createElement("div");
  tin.textContent = clip(detail || label || "");
  const tout = document.createElement("div");
  tout.className = "tout";
  body.append(tin, tout);
  head.onclick = () => wrap.classList.toggle("open");
  wrap.append(head, body);
  if (callId) app.toolNodes.set(callId, { stat, tout });
  return wrap;
}

// 工具输出并入对应折叠行；找不到（如快照被截断）则退化为独立行
function attachToolOutput({ callId, text, code }) {
  const ref = callId ? app.toolNodes.get(callId) : null;
  if (!ref) {
    return text ? toolRow({ icon: "↳", label: `输出${code ? `（退出码 ${code}）` : ""}`, detail: text, callId: null }) : null;
  }
  if (text) {
    ref.tout.textContent = clip(text);
    ref.tout.style.display = "block";
  }
  if (code !== null && code !== undefined) {
    ref.stat.textContent = code === 0 ? "✓" : `✗ ${code}`;
    ref.stat.classList.add(code === 0 ? "ok" : "err");
  }
  return null; // 已并入，无新节点
}

// 每个文件：路径标题 + 着色 diff 行（会话流的改动卡与审批卡共用）
function appendDiffFiles(container, files) {
  for (const f of files) {
    const h = document.createElement("div");
    h.className = "dfile";
    h.textContent = `${f.kind === "add" ? "＋" : f.kind === "delete" ? "－" : "±"} ${f.path}`;
    container.appendChild(h);
    for (const line of clip(f.diff || "").split("\n")) {
      if (!line && f.diff === "") continue; // delete 类无 diff，不渲染空行
      const div = document.createElement("div");
      if (/^\+/.test(line)) div.className = "dl-add";
      else if (/^-/.test(line)) div.className = "dl-del";
      else if (/^@@/.test(line)) div.className = "dl-hunk";
      div.textContent = line || " ";
      container.appendChild(div);
    }
  }
}

// 文件改动卡：标题 + 每个文件的着色 diff
function diffNode({ files, ok }) {
  const wrap = toolRow({
    icon: "✎",
    label: files.length === 1 ? `修改 ${files[0].path.split(/[\\/]/).pop()}` : `修改 ${files.length} 个文件`,
    detail: "", callId: null,
  });
  const stat = wrap.querySelector(".tstat");
  stat.textContent = ok ? "✓" : "✗";
  stat.classList.add(ok ? "ok" : "err");
  const body = wrap.querySelector(".tool-body");
  body.innerHTML = "";
  appendDiffFiles(body, files);
  return wrap;
}

// —— 图片：按 imageRef 分块拉取（image.fetch），拼回 data URL ——
async function loadImage(ref, box) {
  box.textContent = "加载图片…";
  box.onclick = null;
  try {
    let data = "";
    let offset = 0;
    let mime = ref.mime || "image/png";
    for (;;) {
      const r = await app.session.request("image.fetch", { id: ref.id, offset }, 20000);
      data += r.data;
      offset += r.data.length;
      mime = r.mime || mime;
      if (r.eof) break;
      if (offset > 16_000_000) throw new Error("图片过大");
    }
    const img = document.createElement("img");
    img.src = `data:${mime};base64,${data}`;
    box.textContent = "";
    box.appendChild(img);
  } catch (err) {
    box.textContent = `图片加载失败：${err.message}（点按重试）`;
    box.onclick = () => loadImage(ref, box);
  }
}

function imagesNode({ refs, user }) {
  const fresh = refs.filter((r) => !(r.id && app.seenImages.has(r.id)));
  if (!fresh.length) return null; // 生成图的多帧进度会重复出现同一张，只渲染一次
  const msg = document.createElement("div");
  msg.className = `msg${user ? " user" : ""}`;
  const col = document.createElement("div");
  col.style.cssText = user ? "max-width:85%" : "width:100%";
  for (const ref of fresh) {
    if (ref.id) app.seenImages.add(ref.id);
    const box = document.createElement("div");
    box.className = "imgbox";
    if (ref.tooLarge || !ref.id) {
      box.textContent = "图片过大，请在电脑端查看";
    } else {
      loadImage(ref, box);
    }
    col.appendChild(box);
  }
  msg.appendChild(col);
  return msg;
}

function bubbleNode({ cls, text }) {
  const msg = document.createElement("div");
  msg.className = `msg ${cls}`;
  if (cls === "user") {
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = clip(text);
    msg.appendChild(b);
  } else {
    msg.appendChild(mdRender(clip(text)));
    // 超长回复不再一刀切：点开看全部
    if (text.length > CLIP) {
      const more = document.createElement("button");
      more.className = "morelink";
      more.textContent = `展开全部（约 ${Math.round(text.length / 1000)}k 字）`;
      more.onclick = () => {
        msg.innerHTML = "";
        msg.appendChild(mdRender(text));
      };
      msg.appendChild(more);
    }
  }
  return msg;
}

function showBanner(text, onTap) {
  const b = $("banner");
  b.style.display = text ? "block" : "none";
  b.textContent = text || "";
  b.classList.toggle("action", Boolean(onTap));
  b.onclick = onTap || null;
}

// 轻量瞬时提示（如"再按一次返回退出"），自动淡出，不占布局
let toastTimer = null;
function showToast(text, ms = 1600) {
  const t = $("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), ms);
}

// 设置标题文本但保留 #chev 徽标
function setTitle(text) {
  const h = $("title");
  h.firstChild.textContent = text;
}

// 上下文用量：常显标签已按需求移除，只留数据入口（记在 app.ctxPct，将来做逼近上限预警可用）
function setCtx(info) {
  const total = info?.total_token_usage?.total_tokens;
  const win = info?.model_context_window;
  if (!total || !win) return;
  app.ctxPct = Math.min(100, Math.round((total / win) * 100));
}

// 轮次结束后回填会话名（codex 首轮后才起名，"新会话"要变成真名）。防抖：快照回放只触发一次
function refreshTitle() {
  if (app.titleTimer) clearTimeout(app.titleTimer);
  app.titleTimer = setTimeout(async () => {
    app.titleTimer = null;
    if (app.view !== "session" || !app.currentId) return;
    try {
      const { sessions } = await app.session.request("sessions.list", { limit: 50 });
      app.lastSessions = sessions;
      const s = sessions.find((x) => x.id === app.currentId);
      const name = s?.name || s?.preview?.slice(0, 24);
      if (name && name !== app.currentTitle) {
        app.currentTitle = name;
        app.sessionNames.set(app.currentId, name);
        setTitle(name);
        localStorage.setItem("czr-last", JSON.stringify({ id: app.currentId, title: name }));
      }
    } catch {}
  }, 600);
}

function relTime(sec) {
  if (!sec) return "";
  const d = Date.now() / 1000 - sec;
  if (d < 60) return "刚刚";
  if (d < 3600) return `${Math.floor(d / 60)} 分钟前`;
  if (d < 86400) return `${Math.floor(d / 3600)} 小时前`;
  if (d < 7 * 86400) return `${Math.floor(d / 86400)} 天前`;
  return new Date(sec * 1000).toLocaleDateString();
}

// 智能滚动：只在用户本就贴近底部时跟随新内容，翻历史不被打断；
// 离底时显示「↓」浮动按钮
function nearBottom() {
  return window.innerHeight + window.scrollY >= document.body.scrollHeight - 160;
}
function scrollToBottom() {
  window.scrollTo(0, document.body.scrollHeight);
}
function updateJump() {
  $("jump").classList.toggle("show", app.view === "session" && !nearBottom());
}

// —— 状态胶囊 + 分层连接诊断 ——
// 胶囊只显示"最深的断层"；点开弹层看三层各自的状态与建议
function updateStatusPill() {
  const el = $("status");
  el.className = "";
  if (net.link === "connecting") {
    el.textContent = "连接中…";
  } else if (net.link === "down") {
    el.textContent = "重连中…";
    el.className = "down";
  } else if (net.daemon === false) {
    el.textContent = "电脑离线";
    el.className = "down";
  } else if (net.engine === "down") {
    el.textContent = "引擎重启中";
    el.className = "warn";
  } else if (net.daemon === true) {
    // 一切正常：副标题就是当前电脑名（对标官方 App 的 ● 机器名）
    el.textContent = app.session?.info.name || "已连接";
    el.className = "online";
  } else {
    el.textContent = "连接中…";
  }
  // 离线时禁用发送并在占位符里说明，而不是发送后才报错
  const offline = net.link !== "ok" || net.daemon === false;
  $("send").disabled = offline;
  $("input").placeholder = offline ? "电脑离线，恢复后才能发送" : "给 Codex 发消息…";
  if ($("diagsheet").classList.contains("open")) renderDiag();
}

function diagRow(state, title, sub) {
  const row = document.createElement("div");
  row.className = "drow";
  row.style.cursor = "default";
  const dot = document.createElement("span");
  dot.className = `ddot${state ? ` ${state}` : ""}`;
  const main = document.createElement("div");
  main.className = "dname";
  const t = document.createElement("div");
  t.textContent = title;
  const d = document.createElement("div");
  d.className = "dsub wrap";
  d.textContent = sub;
  main.append(t, d);
  row.append(dot, main);
  return row;
}

function renderDiag() {
  const box = $("diaglist");
  box.innerHTML = "";
  const relayHost = (app.session?.info.relay || "").replace(/^wss?:\/\//, "").replace(/[/?#].*$/, "");
  const pcName = app.session?.info.name || "电脑";

  // 1. 手机 ↔ 中继
  if (net.link === "ok") {
    box.appendChild(diagRow("ok", "手机 ↔ 中继", `已连接${relayHost ? ` · ${relayHost}` : ""}`));
  } else if (net.link === "connecting") {
    box.appendChild(diagRow("", "手机 ↔ 中继", "连接中…"));
  } else {
    box.appendChild(diagRow("down", "手机 ↔ 中继",
      "已断开，正在自动重连。请检查手机网络；自建中继需确认中继服务在运行"));
  }

  // 2. 中继 ↔ 电脑
  if (net.link !== "ok") {
    box.appendChild(diagRow("", `中继 ↔ ${pcName}`, "未知：先恢复与中继的连接"));
  } else if (net.daemon === true) {
    box.appendChild(diagRow("ok", `中继 ↔ ${pcName}`, "在线"));
  } else if (net.daemon === false) {
    const seen = net.lastSeen ? `上次在线：${relTime(net.lastSeen / 1000)}。` : "";
    box.appendChild(diagRow("down", `中继 ↔ ${pcName}`,
      `离线。${seen}电脑可能睡眠、关机，或后台服务（daemon）未运行`));
  } else {
    box.appendChild(diagRow("", `中继 ↔ ${pcName}`, "等待状态…"));
  }

  // 3. Codex 引擎
  if (net.link !== "ok" || net.daemon !== true) {
    box.appendChild(diagRow("", "Codex 引擎", "未知：电脑在线后可见"));
  } else if (net.engine === "down") {
    box.appendChild(diagRow("warn", "Codex 引擎", "异常退出，电脑端正在自动重启，稍候自动恢复"));
  } else if (net.engine === "ok") {
    box.appendChild(diagRow("ok", "Codex 引擎", "运行正常"));
  } else {
    box.appendChild(diagRow("", "Codex 引擎", "未上报（电脑端 Remote 版本较旧）"));
  }
}

function openDiag() {
  if (!app.session) return; // 未配对时无从诊断
  renderDiag();
  $("diagsheet").classList.add("open");
}

// —— 列表页：状态看板 ——
function sessionRow(s, inproj = false) {
  const busy = s.running || s.active;
  const row = document.createElement("div");
  row.className = `row${s.approvals ? " appr" : ""}${inproj ? " inproj" : ""}`;
  const dot = document.createElement("span");
  dot.className = `dot${s.approvals ? " appr" : busy ? " run" : ""}`;
  const main = document.createElement("div");
  main.className = "rowmain";
  const title = document.createElement("div");
  title.className = "rowtitle";
  title.textContent = s.name || s.preview || "（无标题）";
  main.appendChild(title);
  // 有正式名字时，最后进展摘要单独一行（一眼知道聊到哪了）
  if (s.name && s.preview && s.preview !== s.name) {
    const snip = document.createElement("div");
    snip.className = "rowsnip";
    snip.textContent = s.preview;
    main.appendChild(snip);
  }
  const sub = document.createElement("div");
  sub.className = "rowsub";
  if (s.approvals) {
    const st = document.createElement("span");
    st.className = "st appr";
    st.textContent = "等待审批";
    sub.appendChild(st);
  } else if (busy) {
    const st = document.createElement("span");
    st.className = "st run";
    st.textContent = "运行中";
    sub.appendChild(st);
  }
  // 项目分组里目录是组头信息，行内不再重复
  const dir = inproj ? "" : (s.cwd || "").split("/").pop() || s.cwd || "";
  const rest = [dir, relTime(s.updatedAt)].filter(Boolean).join(" · ");
  if (rest) sub.appendChild(document.createTextNode(`${sub.childNodes.length ? " · " : ""}${rest}`));
  main.appendChild(sub);
  row.append(dot, main);
  row.onclick = () => openSession(s.id, s.name || s.preview?.slice(0, 24) || "会话");
  return row;
}

// 看板：需要注意的事置顶（审批 > 运行），其余按组织方式排布（按项目 / 时间线）
function renderList(sessions) {
  // 引擎 thread/list 的顺序不保证按最后更新排（实测有旧会话排前），显示前强制按新→旧
  sessions = [...sessions].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  app.sessionNames = new Map(sessions.map((s) => [s.id, s.name || s.preview?.slice(0, 24) || "会话"]));
  app.lastSessions = sessions;
  // 搜索：按名称/摘要/目录过滤（大字状态行仍统计全量）
  const q = app.filter.trim().toLowerCase();
  const visible = q
    ? sessions.filter((s) => `${s.name ?? ""} ${s.preview ?? ""} ${s.cwd ?? ""}`.toLowerCase().includes(q))
    : sessions;
  const list = $("list");
  list.innerHTML = "";

  // 大字状态行只在有事发生时出现（对标官方的安静首页）
  const apprN = sessions.filter((s) => s.approvals).length;
  const runN = sessions.filter((s) => !s.approvals && (s.running || s.active)).length;
  if (apprN || runN) {
    const headline = document.createElement("div");
    headline.id = "headline";
    if (apprN) {
      headline.className = "warn";
      headline.textContent = `${apprN} 个会话在等你审批`;
      if (runN) {
        const sub = document.createElement("span");
        sub.className = "sub";
        sub.textContent = `另有 ${runN} 个任务在运行`;
        headline.appendChild(sub);
      }
    } else {
      headline.textContent = `${runN} 个任务正在运行`;
    }
    list.appendChild(headline);
  }

  const attention = visible.filter((s) => s.approvals || s.running || s.active);
  const rest = visible.filter((s) => !attention.includes(s));
  attention.sort((a, b) => (b.approvals || 0) - (a.approvals || 0));

  if (attention.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "进行中";
    list.appendChild(h);
    for (const s of attention) list.appendChild(sessionRow(s));
  }

  if (app.organize === "proj") {
    renderProjects(list, rest);
  } else {
    // 时间线：继续上次打开的会话（不在"进行中"里时才显示，避免重复）
    const last = JSON.parse(localStorage.getItem("czr-last") || "null");
    const lastSession = last && !attention.some((s) => s.id === last.id)
      ? rest.find((s) => s.id === last.id) : null;
    const h2 = document.createElement("div");
    h2.className = "secthead";
    h2.textContent = "最近";
    list.appendChild(h2);
    if (lastSession) {
      const r = sessionRow(lastSession);
      r.querySelector(".rowsub").prepend(document.createTextNode("上次查看 · "));
      list.appendChild(r);
    }
    for (const s of rest) {
      if (lastSession && s.id === lastSession.id) continue;
      list.appendChild(sessionRow(s));
    }
  }
  if (!visible.length) {
    const n = document.createElement("div");
    n.className = "notice";
    n.textContent = q ? "没有匹配的会话" : "还没有会话——点右下角「新会话」，让电脑开始干活";
    list.appendChild(n);
  }
}

// 按项目（cwd）分组：组头可折叠、右侧图标在该项目下直接开新会话
const FOLDER_SVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>';

// —— 外观：auto 跟随系统 / light / dark 手动锁定（头部有防闪烁的提前应用）——
function getTheme() {

  return t === "light" || t === "dark" ? t : "auto";
}

function applyTheme(mode) {
  if (mode === "light" || mode === "dark") {
    localStorage.setItem("czr-theme", mode);
    document.documentElement.dataset.theme = mode;
  } else {
    localStorage.removeItem("czr-theme");
    delete document.documentElement.dataset.theme;
  }
  // 状态栏/浏览器 UI 跟着走：手动锁定时两个 media meta 都写成锁定色，auto 恢复各自默认
  const dark = "#171b22", light = "#ffffff";
  $("mtcdark").content = mode === "light" ? light : dark;
  $("mtclight").content = mode === "dark" ? dark : light;
