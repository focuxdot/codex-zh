// "项目"只留真正的工作目录，其余算散聊天：
// - 桌面版 Codex 给每个新聊天在 ~/Documents/Codex/<日期>/<聊天名> 建的托管目录
//   （本机会话历史证实的布局），目录名就是聊天名（new-chat、hi…），不是用户的项目
// - 家目录本身、桌面/文档/下载、临时目录、根目录
function isProjectDir(cwd) {
  const p = (cwd || "").trim().replace(/\/+$/, "");
  if (!p || p === "/" || p === "/root") return false;
  if (/\/Documents\/Codex(?:\/|$)/.test(p)) return false;
  if (/^\/(?:Users|home)\/[^/]+$/.test(p)) return false;
  if (/^\/(?:Users|home)\/[^/]+\/(?:Desktop|Documents|Downloads)$/.test(p)) return false;
  if (/^(?:\/private)?\/tmp(?:\/|$)/.test(p) || /^\/var(?:\/|$)/.test(p)) return false;
  return true;
}

function renderProjects(list, sessions) {
  const groups = new Map(); // cwd -> 会话数组（sessions.list 已按新旧排序，组内沿用）
  const chats = [];         // 非项目目录的散聊天，平铺在项目区之后
  for (const s of sessions) {
    const cwd = (s.cwd || "").trim();
    if (!isProjectDir(cwd)) { chats.push(s); continue; }
    if (!groups.has(cwd)) groups.set(cwd, []);
    groups.get(cwd).push(s);
  }
  if (groups.size) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "项目";
    list.appendChild(h);
  }
  for (const [cwd, items] of groups) {
    const closed = !app.expanded.has(cwd);
    const head = document.createElement("div");
    head.className = "proj";
    head.innerHTML = FOLDER_SVG;
    const name = document.createElement("span");
    name.className = "pname";
    name.textContent = cwd.split(/[\\/]/).pop() || cwd;
    const chev = document.createElement("span");
    chev.className = "pchev";
    chev.textContent = closed ? "▸" : "▾";
    head.append(name, chev);
    const add = document.createElement("button");
    add.className = "pnew";
    add.innerHTML = COMPOSE_SVG;
    add.setAttribute("aria-label", `在 ${name.textContent} 新建会话`);
    add.onclick = (e) => {
      e.stopPropagation();
      if (net.link !== "ok" || net.daemon === false) { showBanner("电脑离线，暂时无法新建会话"); return; }
      createSession(cwd);
    };
    head.appendChild(add);
    head.onclick = () => {
      if (app.expanded.has(cwd)) app.expanded.delete(cwd);
      else app.expanded.add(cwd);
      localStorage.setItem("czr-expanded", JSON.stringify([...app.expanded]));
      renderList(app.lastSessions);
    };
    list.appendChild(head);
    if (!closed) for (const s of items) list.appendChild(sessionRow(s, true));
  }
  if (chats.length) {
    const h = document.createElement("div");
    h.className = "secthead";
    h.textContent = "对话"; // 与桌面版侧栏的分区文案一致
    list.appendChild(h);
    for (const s of chats) list.appendChild(sessionRow(s, true));
  }
}

async function refreshList() {
  const { sessions } = await app.session.request("sessions.list", { limit: 50 });
  renderList(sessions);
}

// 看板变化时节流刷新（仅列表视图）
function scheduleListRefresh() {
  if (app.view !== "list" || app.refreshTimer) return;
  app.refreshTimer = setTimeout(() => {
    app.refreshTimer = null;
    if (app.view === "list") refreshList().catch(() => {});
  }, 800);
}

async function openSession(id, title, opts = {}) {
  // 手机系统返回键/右滑返回走浏览器 history：从列表进会话时压一条历史，
  // 这样系统返回会触发 popstate 回首页，而不是把整个页面/PWA 弹掉。
  // 已在会话内（如右上角新建会话）不重复压栈——始终只留一条“会话→首页”的返回。
  if (app.view !== "session") history.pushState({ czr: "session" }, "");
  app.view = "session";
  app.currentId = id;
  app.currentTitle = title;
  // 新建的空会话在发出第一条消息前没有 rollout 文件，无法 watch（会 404「会话不存在」）；
  // 先进视图并标记待接入，等 dispatch 发出首条消息后再补 watch
  app.pendingWatch = !!opts.fresh;
  app.running = false;
  app.echoes = [];
  app.toolNodes.clear();
  app.seenImages.clear();
  app.sawFunctionCalls = false;
  app.stream = null;
  // 每次进会话把历史回填窗口复位（首屏与 daemon watch 的 SNAPSHOT_MAX_ITEMS 一致）
  app.histLimit = 200;
  app.histTotal = 0;
  app.loadingEarlier = false;
  app.earlierAnchor = null;
  resetPullTip();
  app.ctxPct = null; // 用量随本会话的 token_count 事件回填
  $("input").value = app.drafts.get(id) ?? ""; // 恢复本会话的未发送草稿
  app.attachments = [];
  app.queue = [];
  renderAttachments();
  setPlanMode(false); // 计划模式是会话级选择，不跨会话
  autoGrow();
  updateSendState();
  localStorage.setItem("czr-last", JSON.stringify({ id, title }));
  document.body.classList.add("insession");
  $("list").classList.add("hidden");
  $("viewer").classList.add("active");
  $("composer").classList.add("active");
  $("back").style.display = "flex";
  setTitle(title);
  $("log").innerHTML = opts.fresh ? "" : '<div class="notice">加载中…</div>';
  setRunning(false);
  // 看板的 running 是"daemon 正在驱动"的权威标志：新开页面没有 live 事件回放，
  // 只靠 tail 推断会把 daemon 驱动误判成桌面驱动（丢失停止按钮）
  const known = app.lastSessions.find((s) => s.id === id);
  if (known?.running) setRunning(true, "daemon");
  renderApprovals(); // 该会话的待审批卡从全局区移入对话流
  if (opts.fresh) return; // 空会话：暂不 watch，首条消息发出后由 dispatch 接入
  try {
    await app.session.request("session.watch", { sessionId: id });
  } catch (err) {
    // 会话可能已被清理（深链/继续上次都可能指向失效 id）：报错并退回列表
    showBanner(`打开会话失败：${err.message}`);
    history.back(); // 消费掉刚压入的历史项，经 popstate 统一走 closeSession
  }
}

async function closeSession() {
  // 未发送的草稿存起来（排队未发出的文本一并并入），回来接着写；不带进下一个会话
  if (app.currentId) {
    const queued = app.queue.map((q) => q.text).filter(Boolean);
    app.drafts.set(app.currentId,
      [$("input").value, ...queued].filter((s) => s.trim()).join("\n"));
  }
  app.queue = [];
  app.attachments = [];
  renderAttachments();
  $("input").value = "";
  autoGrow();
  updateSendState();
  app.view = "list";
  app.currentId = null;
  app.echoes = [];
  app.toolNodes.clear();
  app.stream = null;
  setRunning(false);
  updateJump();
  document.body.classList.remove("insession");
  $("viewer").classList.remove("active");
  $("composer").classList.remove("active");
  $("log").innerHTML = "";
  $("list").classList.remove("hidden");
  $("back").style.display = "none";
  setTitle("C叉叉");
  renderApprovals();
  // 网络动作放到视图切换之后、且不阻塞返回：unwatch 只是通知 daemon 停止推流，
  // 就算失败也已离开会话；迟到的 live 事件因 currentId 已清空会被忽略。
  app.session.request("session.unwatch").catch(() => {});
  await refreshList().catch(() => {});
}

// 运行状态区分驱动方：daemon（手机发起，可停止）/ desktop（桌面 GUI 在跑，只可看，
// daemon 停不了别人的进程——tail 的 task_started 只在非 daemon 驱动时判为桌面）
function setRunning(running, driver = "daemon", startAt) {
  if (running && !app.running) app.runStart = startAt ?? Date.now();
  else if (running && startAt) app.runStart = Math.min(app.runStart, startAt);
  app.running = running;
  app.driver = running ? driver : null;
  const stoppable = running && driver === "daemon";
  // 运行中排队追加仍可用：输入为空时只显示停止 ■，写了内容 ↑ 才出现（updateSendState 统一管）
  $("stop").style.display = stoppable ? "block" : "none";
  $("input").placeholder = stoppable ? "追加消息，本轮结束后发送…" : "给 Codex 发消息…";
  updateSendState();
  // 运行提示由 log 顶部的状态条承担（含驱动方与耗时），操作排的 runhint 只留给"正在停止…"反馈
  $("runhint").style.display = "none";
  // 运行中每秒刷新状态条的耗时
  if (running && !app.runTimer) {
    app.runTimer = setInterval(updateStatusStrip, 1000);
  } else if (!running && app.runTimer) {
    clearInterval(app.runTimer);
    app.runTimer = null;
  }
  updateStatusStrip();
  if (!running) flushQueue();
}

// rollout tail 里的轮次事件：桌面 GUI 驱动的会话没有 live 事件，
// 运行状态只能从这里推断（daemon 驱动时 live 先到、driver 已是 daemon，不降级）
function tailRunning(on, startedAtSec) {
  if (on) {
    const driver = app.running && app.driver === "daemon" ? "daemon" : "desktop";
    setRunning(true, driver, startedAtSec ? startedAtSec * 1000 : undefined);
  } else {
    setRunning(false);
  }
}

function fmtDur(ms) {
  const s = Math.floor(ms / 1000);
  return s < 60 ? `${s} 秒` : `${Math.floor(s / 60)} 分 ${String(s % 60).padStart(2, "0")} 秒`;
}

// 会话页状态条：等待审批 > 运行中（含耗时） > 隐藏
function updateStatusStrip() {
  const el = $("sstatus");
  const hasApproval = [...app.approvals.values()].some((p) => p.sessionId === app.currentId);
  if (hasApproval) {
    el.className = "appr";
    el.style.display = "block";
    el.textContent = "Codex 在等你的审批";
  } else if (app.running) {
    el.className = "";
    el.style.display = "block";
    el.innerHTML = '<span class="pulse"></span>';
    const who = app.driver === "desktop" ? "桌面端正在运行" : "Codex 正在工作…";
    el.appendChild(document.createTextNode(`${who} ${fmtDur(Date.now() - app.runStart)}`));
  } else {
    el.style.display = "none";
  }
}

// —— 乐观发送：立即渲染带"发送中"态的用户气泡，等 rollout tail 确认后去重 ——
function echoBubble(text, atts = []) {
  const msg = document.createElement("div");
  msg.className = "msg user";
  const col = document.createElement("div");
  col.className = "echocol";
  if (atts.length) {
    const row = document.createElement("div");
    row.className = "echoimgs";
    for (const a of atts) {
      const img = document.createElement("img");
      img.src = `data:${a.mime};base64,${a.b64}`;
      row.appendChild(img);
    }
    col.appendChild(row);
  }
  if (text) {
    const b = document.createElement("div");
    b.className = "bubble";
    b.textContent = clip(text);
    col.appendChild(b);
  }
  const note = document.createElement("div");
  note.className = "qtag";
  note.style.display = "none";
  col.appendChild(note);
  msg.appendChild(col);
  return msg;
}

function setEchoNote(el, text) {
  const note = el.querySelector(".qtag");
  if (!note) return;
  note.textContent = text;
  note.style.display = text ? "block" : "none";
}

function addEcho(text, atts = []) {
  const msg = echoBubble(text, atts);
  msg.classList.add("pending");
  $("log").appendChild(msg);
  app.echoes.push({ text, imgs: atts.length > 0, el: msg });
  scrollToBottom();
  return msg;
}

function consumeEcho(text) {
  const idx = app.echoes.findIndex((e) => e.text.trim() === text.trim());
  if (idx === -1) return false;
  app.echoes[idx].el.remove();
  app.echoes.splice(idx, 1);
  return true;
}

// 纯图片消息没有文本可匹配：tail 的用户图片气泡到达时，摘掉最早的图片乐观气泡
function consumeImgEcho() {
  const idx = app.echoes.findIndex((e) => !e.text && e.imgs);
  if (idx === -1) return;
  app.echoes[idx].el.remove();
  app.echoes.splice(idx, 1);
}

function dropEcho(el) {
  const idx = app.echoes.findIndex((e) => e.el === el);
  if (idx !== -1) app.echoes.splice(idx, 1);
  el.remove();
}

async function sendMessage() {
  const input = $("input");
  const text = input.value.trim();
  const atts = app.attachments.slice();
  if ((!text && !atts.length) || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner("电脑离线，暂时无法发送（输入内容已保留）");
    return;
  }
  input.value = "";
  app.attachments = [];
  renderAttachments();
  autoGrow();
  updateSendState();
  // daemon 驱动运行中：进本地队列，本轮结束后自动发出（点气泡可撤回）
  if (app.running && app.driver === "daemon") {
    enqueue(text, atts);
    return;
  }
  await dispatch(text, atts);
}

async function dispatch(text, atts) {
  const echo = addEcho(text, atts);
  setRunning(true);
  try {
    const images = [];
    for (let i = 0; i < atts.length; i++) {
      setEchoNote(echo, `上传图片 ${i + 1}/${atts.length}…`);
      images.push(await uploadImage(atts[i]));
    }
    setEchoNote(echo, "");
    // 首条消息含 resume + 模型初始化，可能较慢
    await app.session.request("session.send", {
      sessionId: app.currentId, text,
      images: images.length ? images : undefined,
      options: turnOptions(), // 按轮权限/模型 override（默认不传，沿用电脑配置）
    }, 90000);
    if (app.pendingWatch) {
      // 空会话首条消息已发出 → rollout 文件已生成，现在接入流式与历史
      app.pendingWatch = false;
      try { await app.session.request("session.watch", { sessionId: app.currentId }); }
      catch (e) { showBanner(`会话接入失败：${e.message}`); }
    }
  } catch (err) {
    setRunning(false);
    dropEcho(echo);
    const input = $("input");
    if (text && !input.value.trim()) { // 失败不吞输入，放回输入框（但不覆盖此间新输入的内容）
      input.value = text;
      autoGrow();
    }
    if (atts.length && !app.attachments.length) {
      app.attachments = atts;
      renderAttachments();
    }
    updateSendState();
    showBanner(/未知方法/.test(err.message)
      ? "电脑端 Remote 程序是旧版本，不支持发送图片——在电脑上重启它即可"
      : `发送失败：${err.message}`);
  }
}

// —— 运行中排队：轮次结束（setRunning(false)）后逐条发出 ——
function enqueue(text, atts) {
  const msg = echoBubble(text, atts);
  msg.classList.add("queued");
  setEchoNote(msg, "本轮结束后发送 · 点按撤回");
  $("log").appendChild(msg);
  scrollToBottom();
  const q = { text, atts, el: msg };
  msg.onclick = () => { // 撤回：内容放回输入框/附件区
    const i = app.queue.indexOf(q);
    if (i === -1) return;
    app.queue.splice(i, 1);
    msg.remove();
    const input = $("input");
    if (text) input.value = input.value.trim() ? `${input.value}\n${text}` : text;
    app.attachments = app.attachments.concat(atts).slice(0, MAX_ATTACH);
    renderAttachments();
    autoGrow();
    updateSendState();
  };
  app.queue.push(q);
}

let flushing = false;
async function flushQueue() {
  if (flushing || !app.queue.length) return;
  if (app.view !== "session" || !app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) return; // 离线保持排队
  flushing = true;
  const q = app.queue.shift();
  q.el.remove();
  try {
    await dispatch(q.text, q.atts); // 失败时 dispatch 已回填输入框；剩余的继续排队
  } finally {
    flushing = false;
  }
}

// —— 图片附件：选图/拍照 -> 压缩 -> 缩略图预览 -> 分块上传 ——
const MAX_ATTACH = 4;

function renderAttachments() {
  const row = $("attachrow");
  row.innerHTML = "";
  row.classList.toggle("on", app.attachments.length > 0);
  app.attachments.forEach((a, i) => {
    const box = document.createElement("div");
    box.className = "att";
    const img = document.createElement("img");
    img.src = `data:${a.mime};base64,${a.b64}`;
    const del = document.createElement("button");
    del.setAttribute("aria-label", "移除图片");
    del.textContent = "✕";
    del.onclick = () => {
      app.attachments.splice(i, 1);
      renderAttachments();
      updateSendState();
    };
    box.append(img, del);
    row.appendChild(box);
  });
}

function updateSendState() {
  const empty = !$("input").value.trim() && !app.attachments.length;
  $("send").disabled = empty;
  // 运行中只留一个按钮位：没内容时是停止 ■，写了要追加的内容 ↑ 才出现（单槽位，不摆两个按钮）
  const stoppable = app.running && app.driver === "daemon";
  $("send").style.display = stoppable && empty ? "none" : "";
}

// —— 计划模式 / 会话目标 / 发文件（对齐官方 Codex App 的 ➕ 菜单）——
function setPlanMode(on) {
  app.planMode = on;
  $("planck").textContent = on ? "✓" : "";
  $("planpill").style.display = on ? "" : "none";
}

// 目标：thread/goal/set|get 的手机入口。prompt 回显当前目标，清空即移除
async function editGoal() {
  if (!app.currentId) return;
  if (net.link !== "ok" || net.daemon === false) {
    showBanner("电脑离线，暂时无法设定目标");
    return;
  }
  let current = "";
  try {
    const r = await app.session.request("goal.get", { sessionId: app.currentId });
    current = r.goal ?? "";
  } catch {} // 旧 daemon / 旧引擎拿不到就从空开始
  const goal = prompt("会话目标（Codex 会持续朝它推进；清空则移除）：", current);
  if (goal === null) return;
  try {
    await app.session.request("goal.set", { sessionId: app.currentId, goal: goal.trim() });
    showBanner(goal.trim() ? "目标已设定" : "目标已移除");
    setTimeout(() => showBanner(""), 2500);
  } catch (err) {
    showBanner(/未知方法/.test(err.message)
      ? "电脑端 Remote 程序是旧版本，不支持目标——在电脑上重启它即可"
      : `设定目标失败：${err.message}`);
  }
}

// 发文件：文本文件读入后以代码块拼进消息（引擎输入模态只有文本+图片，
// 二进制文档发不了；图片则自动转走图片管线）
async function attachTextFile(file) {
  if (file.type.startsWith("image/")) {
    await pickFiles([file]);
    return;
  }
  const MAX = 64_000;
  const text = await file.text();
  if (text.includes("\u0000")) {
    showBanner("这是二进制文件，发不了——只支持文本文件和图片");
    return;
  }
  if (text.length > MAX) {
    showBanner("文件超过 64KB，请截取需要的部分，或直接在消息里告诉 Codex 文件路径");
    return;
  }
  const input = $("input");
  const block = `[文件 ${file.name}]\n\`\`\`\n${text}\n\`\`\``;
  input.value = input.value.trim() ? `${input.value.trimEnd()}\n\n${block}` : block;
  autoGrow();
  updateSendState();
}

// 剪贴板贴图：手机上「截图 → 复制 → 贴给 Codex」是高频路径
async function pasteImage() {
  if (!navigator.clipboard?.read) {
    showBanner("此浏览器不支持读取剪贴板图片，请用「选照片」");
    return;
  }
  try {
    const items = await navigator.clipboard.read();
    let found = false;
    for (const it of items) {
      const type = it.types.find((t) => t.startsWith("image/"));
      if (!type) continue;
      const blob = await it.getType(type);
      await pickFiles([new File([blob], "clipboard", { type })]);
      found = true;
    }
    if (!found) showBanner("剪贴板里没有图片");
  } catch {
    showBanner("无法读取剪贴板（未授权或已为空）");
  }
}

async function pickFiles(files) {
  for (const f of files) {
    if (app.attachments.length >= MAX_ATTACH) {
      showBanner(`一次最多发送 ${MAX_ATTACH} 张图片`);
      break;
    }
    try {
      app.attachments.push(await compressImage(f));
    } catch {
      showBanner(`无法读取图片：${f.name || "未知格式"}`);
    }
  }
  renderAttachments();
  updateSendState();
}

// 手机原图动辄 3-12MB：长边压到 1568px、JPEG 0.85（模型看图够用）；
// 小图（<300KB 且格式友好）原样直传，保住截图里的文字清晰度
async function compressImage(file) {
  if (file.size <= 300 * 1024 && /^image\/(png|jpeg|webp|gif)$/.test(file.type)) {
    return { b64: await fileToB64(file), mime: file.type };
  }
  const bmp = await loadBitmap(file);
  const w = bmp.width || bmp.naturalWidth;
  const h = bmp.height || bmp.naturalHeight;
  const scale = Math.min(1, 1568 / Math.max(w, h));
  const canvas = document.createElement("canvas");
  canvas.width = Math.max(1, Math.round(w * scale));
  canvas.height = Math.max(1, Math.round(h * scale));
  canvas.getContext("2d").drawImage(bmp, 0, 0, canvas.width, canvas.height);
  const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
  return { b64: dataUrl.slice(dataUrl.indexOf(",") + 1), mime: "image/jpeg" };
}

async function loadBitmap(file) {
  try {
    return await createImageBitmap(file);
  } catch { // 部分格式（如旧 Safari 的 HEIC）走 <img> 解码兜底
    const url = URL.createObjectURL(file);
    try {
      const img = new Image();
      img.src = url;
      await img.decode();
      return img;
    } finally {
      URL.revokeObjectURL(url);
    }
  }
}

function fileToB64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => {
      const s = String(r.result);
      resolve(s.slice(s.indexOf(",") + 1));
    };
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

// —— 按轮权限/模型选择（对标 Claude App composer 的操作排）——
// 权限预设与桌面端一致（bundle 证实的 turn/start 字段）：sandboxPolicy 是 {type} 对象
const PERM_PRESETS = [
  { key: "default", name: "跟随电脑配置", desc: "沿用会话与 config.toml 的既有审批/沙箱设置" },
  { key: "readonly", name: "只读", desc: "只能读文件，任何改动与命令都逐次审批" },
  { key: "auto", name: "代理", desc: "工作区内可写可执行，出界操作需审批" },
  { key: "full", name: "完全访问", desc: "跳过审批直接执行任何命令（高风险）", warn: true },
];
// 权限胶囊只显图标（对标官方 App）；具体档位靠图标区分，红边叠加警示完全访问。
// 线性图标（lucide，MIT）：shield=默认 / lock=只读 / zap=代理 / triangle-alert=完全访问。
// stroke=currentColor 继承按钮的点亮(.set)与警示(.warn)变色；尺寸由 CSS 控制。
const SVG = (body) =>
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${body}</svg>`;
const PERM_ICON = {
  default: SVG(`<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>`),
  readonly: SVG(`<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`),
  auto: SVG(`<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>`),
  full: SVG(`<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="M12 8v4"/><path d="M12 16h.01"/>`),
};
const EFFORT_ZH = { low: "低", medium: "中", high: "高", xhigh: "超高" };

// 模型简写：取带小数点的版本号（gpt-5.5-codex -> 5.5），没有就剥掉厂商前缀原样显示
function shortModel(name) {
  const s = String(name || "").trim();
  const m = s.match(/\d+\.\d+/);
  return m ? m[0] : s.replace(/^(gpt|codex|openai)[-_ ]/i, "");
}

function loadTurnOpts() {
  const base = { perm: "default", model: null, modelName: null, effort: null };
  try {
    return { ...base, ...JSON.parse(localStorage.getItem("czr-turnopts") || "{}") };
  } catch {
    return base;
  }
}

function saveTurnOpts() {
  localStorage.setItem("czr-turnopts", JSON.stringify(app.turnOpts));
}

// session.send 的 options：default/未选模型时不传字段，daemon 沿用既有配置
function turnOptions() {
  const o = {};
  if (app.planMode) o.plan = true; // daemon 展开为 collaborationMode {mode:"plan"}
  const p = app.turnOpts.perm;
  if (p === "readonly") { o.approvalPolicy = "on-request"; o.sandboxPolicy = { type: "readOnly" }; }
  else if (p === "auto") { o.approvalPolicy = "on-request"; o.sandboxPolicy = { type: "workspaceWrite" }; }
  else if (p === "full") { o.approvalPolicy = "never"; o.sandboxPolicy = { type: "dangerFullAccess" }; }
  if (app.turnOpts.model) {
    o.model = app.turnOpts.model;
    if (app.turnOpts.effort) o.effort = app.turnOpts.effort;
  }
  return Object.keys(o).length ? o : undefined;
}

function updateOptButtons() {
  const pb = $("permbtn");
  pb.innerHTML = PERM_ICON[app.turnOpts.perm] ?? PERM_ICON.default;
  const preset = PERM_PRESETS.find((p) => p.key === app.turnOpts.perm);
  pb.setAttribute("aria-label", `本轮权限：${preset?.name ?? "跟随电脑配置"}`);
  pb.classList.toggle("set", app.turnOpts.perm !== "default");
  pb.classList.toggle("warn", app.turnOpts.perm === "full");
  const mb = $("modelbtn");
  // 未按轮指定时显示电脑端默认模型；列表还没取到（或旧 daemon）给"模型"占位
  const explicit = !!app.turnOpts.model;
  const def = app.models?.find((m) => m.isDefault) ?? app.models?.[0];
  const name = explicit ? (app.turnOpts.modelName || app.turnOpts.model) : (def?.name || def?.id);
  mb.classList.toggle("ph", !name);
  if (!name) { mb.textContent = "模型"; return; }
  const meta = app.models?.find((m) => m.id === (explicit ? app.turnOpts.model : def?.id));
  const effKey = (explicit && app.turnOpts.effort) || meta?.defaultEffort || null;
  mb.textContent = "";
  const main = document.createElement("span");
  main.textContent = shortModel(name);
  mb.appendChild(main);
  if (effKey) {
    const sub = document.createElement("span");
    sub.className = "msub";
    sub.textContent = " " + (EFFORT_ZH[effKey] ?? effKey);
    mb.appendChild(sub);
  }
}

// 静默预取模型列表：让模型胶囊在"跟随电脑配置"时也能显示默认模型号。
// 旧 daemon 没有 models.list，失败即算了（点开弹层时再给明确提示）
let modelsLoading = false;
async function prefetchModels() {
  if (app.models || modelsLoading || !app.session) return;
  modelsLoading = true;
  try {
    const r = await app.session.request("models.list", {});
    app.models = r.models ?? [];
    updateOptButtons();
  } catch { /* 忽略：胶囊维持占位 */ }
  finally { modelsLoading = false; }
}

function sheetRow(box, { title, sub, active, warn, icon, onclick }) {
  const row = document.createElement("div");
  row.className = "drow" + (active ? " active" : "");
  if (icon) {
    const ic = document.createElement("span");
    ic.className = "dico";
    ic.innerHTML = icon;
    if (warn) ic.style.color = "var(--err)";
    row.appendChild(ic);
  }
  const main = document.createElement("div");
  main.className = "dname";
  const t = document.createElement("div");
  t.textContent = title;
  if (warn) t.style.color = "var(--err)";
  main.appendChild(t);
  if (sub) {
    const d = document.createElement("div");
    d.className = "dsub wrap";
    d.textContent = sub;
    main.appendChild(d);
  }
  row.appendChild(main);
  if (active) {
    const cur = document.createElement("span");
    cur.className = "dcur";
    cur.textContent = "当前";
    row.appendChild(cur);
  }
  row.onclick = onclick;
  box.appendChild(row);
  return row;
}

function openPermSheet() {
  const box = $("permlist");
  box.innerHTML = "";
  for (const p of PERM_PRESETS) {
    sheetRow(box, {
      title: p.name, sub: p.desc, warn: p.warn, icon: PERM_ICON[p.key],
      active: app.turnOpts.perm === p.key,
      onclick: () => {
        if (p.key === "full" && app.turnOpts.perm !== "full" &&
            !confirm("完全访问：之后从手机发出的消息将不经审批直接执行命令。确认你信任当前任务再切换。")) {
          return;
        }
        app.turnOpts.perm = p.key;
        saveTurnOpts();
        updateOptButtons();
        $("permsheet").classList.remove("open");
      },

  }
  $("permsheet").classList.add("open");
}

async function openModelSheet() {
  $("modelsheet").classList.add("open");
  const box = $("modellist");
  if (!app.models) {
    if (net.link !== "ok" || net.daemon === false) {
      $("modelsheet").classList.remove("open");
      showBanner("电脑离线，暂时无法读取模型列表");
      return;
    }
    box.innerHTML = '<div class="notice">读取模型列表…</div>';
    try {
      const r = await app.session.request("models.list", {});
      app.models = r.models ?? [];
    } catch (err) {
      $("modelsheet").classList.remove("open");
      // 协议约定：客户端不能假设新方法存在（daemon 是常驻进程，可能还是旧版本）
      showBanner(/未知方法/.test(err.message)
        ? "电脑端 Remote 程序是旧版本，不支持模型选择——在电脑上重启它即可"
        : `读取模型列表失败：${err.message}`);
      return;

  renderModelSheet();
}

function renderModelSheet() {
  const box = $("modellist");
  box.innerHTML = "";
  sheetRow(box, {
    title: "跟随电脑配置", sub: "使用电脑端当前默认的模型与推理力度",
    active: !app.turnOpts.model,
    onclick: () => {
      app.turnOpts.model = null;
      app.turnOpts.modelName = null;
      app.turnOpts.effort = null;
      saveTurnOpts();
      updateOptButtons();
      $("modelsheet").classList.remove("open");
    },
  });
  for (const m of app.models) {
    sheetRow(box, {
      title: m.name, sub: m.description,
      active: app.turnOpts.model === m.id,
      onclick: () => { // 选模型即选中并关闭；力度取该模型默认值，重开弹层可在底部微调
        app.turnOpts.model = m.id;
        app.turnOpts.modelName = m.name;
        app.turnOpts.effort = null;
        saveTurnOpts();
        updateOptButtons();
        $("modelsheet").classList.remove("open");
      },
    });
  }
  const m = app.models.find((x) => x.id === app.turnOpts.model);
  if (m?.efforts?.length) {
    const head = document.createElement("div");
    head.className = "sheethead";
    head.style.marginTop = "12px";
    head.textContent = "推理力度";
    box.appendChild(head);
    const row = document.createElement("div");
    row.className = "effrow";
    for (const e of m.efforts) {
      const chip = document.createElement("button");
      chip.className = "chip";
      const selected = app.turnOpts.effort ? app.turnOpts.effort === e : e === m.defaultEffort;
      if (selected) chip.classList.add("sel");
      chip.textContent = (EFFORT_ZH[e] ?? e) + (e === m.defaultEffort ? "（默认）" : "");
      chip.onclick = () => {
        app.turnOpts.effort = e === m.defaultEffort ? null : e; // 默认力度不显式传
        saveTurnOpts();
        updateOptButtons();
        $("modelsheet").classList.remove("open");
      };
      row.appendChild(chip);
    }
    box.appendChild(row);
  }
}

// 分块上传（image.fetch 的镜像：单块 ≤96k base64 字符，远小于 relay 帧上限）
async function uploadImage(a) {
  const id = crypto.randomUUID().replace(/-/g, "").slice(0, 16);
  const CHUNK = 96000;
  for (let o = 0; o < a.b64.length; o += CHUNK) {
    await app.session.request("image.push", {
      id,
      mime: a.mime,
      data: a.b64.slice(o, o + CHUNK),
      eof: o + CHUNK >= a.b64.length,
    }, 30000);
  }
  return id;
}

async function stopTurn() {
  if (!app.currentId) return;
  // 即时反馈：真正的停止确认要等 turn 结束事件，期间按钮置灰、提示"正在停止"
  $("stop").disabled = true;
  $("runhint").innerHTML = '<span class="pulse"></span>正在停止…';
  $("runhint").style.display = "block";
  try {
    const r = await app.session.request("turn.interrupt", { sessionId: app.currentId });
    if (!r.ok && r.reason) showBanner(`停止未生效：${r.reason}`);
  } catch (err) {
    showBanner(`停止失败：${err.message}`);
  } finally {
    $("stop").disabled = false;
  }
}

// 新建会话：从最近会话提取常用目录列表，点选即建，手输仅作兜底
function newSession() {
  if (net.link !== "ok" || net.daemon === false) {
    showBanner("电脑离线，暂时无法新建会话");
    return;
  }
  const dirs = [];
  const seen = new Set();
  for (const s of app.lastSessions) {
    const cwd = (s.cwd || "").trim();
    if (!cwd || seen.has(cwd)) continue;
    seen.add(cwd);
    dirs.push(cwd);
    if (dirs.length >= 8) break;
  }
  const box = $("dirlist");
  box.innerHTML = "";
  const addRow = (title, sub, onclick) => {
    const row = document.createElement("div");
    row.className = "drow";
    const main = document.createElement("div");
    main.className = "dname";
    const t = document.createElement("div");
    t.textContent = title;
    main.appendChild(t);
    if (sub) {
      const d = document.createElement("div");
      d.className = "dsub";
      d.textContent = sub;
      main.appendChild(d);
    }
    row.appendChild(main);
    row.onclick = onclick;
    box.appendChild(row);
  };
  for (const dir of dirs) {
    addRow(dir.split(/[\\/]/).pop() || dir, dir, () => createSession(dir));
  }
  addRow("默认目录", "由电脑端决定", () => createSession(undefined));
  addRow("其他目录…", "手动输入完整路径", () => {
    $("dirsheet").classList.remove("open");
    const cwd = prompt("工作目录完整路径：", "");
    if (cwd === null) return;
    createSession(cwd.trim() || undefined);
  });
  $("dirsheet").classList.add("open");
}

async function createSession(cwd) {
  $("dirsheet").classList.remove("open");
  showBanner("正在新建会话，可能需要几秒…");
  try {
    const res = await app.session.request("session.new", { cwd }, 90000);
    if (res.threadId) {
      showBanner("");
      openSession(res.threadId, "新会话", { fresh: true });
    } else {
      showBanner("新建会话失败：未返回会话 id");
    }
  } catch (err) {
    showBanner(`新建失败：${err.message}`);
  }
}

// —— 审批：当前会话内嵌对话流，其余全局置顶；任一设备处理后各端同步消失 ——
let titleBlink = null;
function updateTitleBlink() {
  const n = app.approvals.size;
  if (n > 0 && !titleBlink) {
    let flip = false;
    titleBlink = setInterval(() => {
      flip = !flip;
      document.title = flip ? `（${app.approvals.size} 个审批）Codex-叉叉` : "Codex-叉叉";
    }, 1200);
  } else if (n === 0 && titleBlink) {
    clearInterval(titleBlink);
    titleBlink = null;
    document.title = "Codex-叉叉";
  }
}

// 高危命令特征：不可逆删除 / 强推 / 提权。命中则红框警示，且不提供"本会话内放行"
const DANGER_RE = /\brm\s+(-[a-z]*\s+)*-[a-z]*r[a-z]*f|\bgit\s+push\s+.*--force\b|\bsudo\b|\bmkfs\b|\bdd\s+if=/i;

function buildApprovalCard(p) {
  const card = document.createElement("div");
  card.className = "approval";
  card.dataset.key = p.approvalKey;
  const title = document.createElement("div");
  title.className = "atitle";
  const sname = app.sessionNames.get(p.sessionId) || "会话";
  const kind = p.kind === "fileChange" ? "请求修改文件" : "请求执行命令";
  title.textContent = p.sessionId === app.currentId && app.view === "session"
    ? kind : `${sname} · ${kind}`;
  const cmdText = Array.isArray(p.command) ? p.command.join(" ") : (p.command || p.reason || "（详情见电脑端）");
  const dangerous = p.kind !== "fileChange" && DANGER_RE.test(cmdText);
  const body = document.createElement("div");
  body.className = `acmd${dangerous ? " danger" : ""}`;
  if (p.kind === "fileChange" && Array.isArray(p.files) && p.files.length) {
    appendDiffFiles(body, p.files); // 文件审批：直接看 diff，不再是"详情见电脑端"
  } else {
    body.textContent = cmdText;
  }
  const btns = document.createElement("div");
  btns.className = "abtns";
  const decide = async (decision) => {
    app.approvals.delete(p.approvalKey);
    renderApprovals();
    try {
      const r = await app.session.request("approval.respond", { approvalKey: p.approvalKey, decision });
      if (!r.ok && r.reason) showBanner(`审批未生效：${r.reason}`);
    } catch (err) {
      showBanner(`审批失败：${err.message}`);
    }
  };
  const yes = document.createElement("button");
  yes.className = "ayes"; yes.textContent = "批准";
  yes.onclick = () => decide("accept");
  const no = document.createElement("button");
  no.className = "ano"; no.textContent = "拒绝";
  no.onclick = () => decide("decline");
  btns.append(yes, no);
  card.append(title, body);
  if (p.cwd) {
    const cwd = document.createElement("div");
    cwd.className = "acwd";
    cwd.textContent = `目录：${p.cwd}`;
    card.appendChild(cwd);
  }
  if (dangerous) {
    const warn = document.createElement("div");
    warn.className = "adanger";
    warn.textContent = "⚠ 此命令不可逆或涉及高权限，请确认后再批准";
    card.appendChild(warn);
  }
  card.appendChild(btns);
  if (!dangerous && p.kind !== "fileChange") {
    const all = document.createElement("button");
    all.className = "aall";
    all.textContent = "批准，且本会话内不再询问";
    all.onclick = () => decide("acceptForSession");
    card.appendChild(all);
  }
  return card;
}

// 统一重绘所有待审批卡：当前会话的插入对话流末尾，其余置顶全局区
function renderApprovals() {
  const stick = nearBottom(); // 正在翻历史时不拽走用户，靠状态条与标题提醒
  $("approvals").innerHTML = "";
  document.querySelectorAll("#log .approval").forEach((n) => n.remove());
  let inlined = false;
  for (const p of app.approvals.values()) {
    const card = buildApprovalCard(p);
    if (app.view === "session" && p.sessionId === app.currentId) {
      $("log").appendChild(card);
      inlined = true;
    } else {
      $("approvals").appendChild(card);
    }
  }
  if (inlined && stick) scrollToBottom();
  updateJump();
  updateTitleBlink();
  updateStatusStrip();
}

function showApproval(p) {
  if (app.approvals.has(p.approvalKey)) return;
  app.approvals.set(p.approvalKey, p);
  renderApprovals();
  try { navigator.vibrate?.([180, 90, 180]); } catch {}
}

function resolveApproval(approvalKey) {
  if (!app.approvals.delete(approvalKey)) return;
  renderApprovals();
}

function renderInto(items) {
  const stick = nearBottom();
  const frag = document.createDocumentFragment();
  for (const item of items) {
    // 轮次事件驱动运行状态（顺序处理，快照回放后落在正确的最终状态）
    if (item?.type === "event_msg") {
      const pt = item.payload?.type;
      if (pt === "task_started") tailRunning(true, item.payload?.started_at);
      else if (pt === "task_complete") { tailRunning(false); refreshTitle(); }
      else if (pt === "turn_aborted") tailRunning(false);
      else if (pt === "token_count") setCtx(item.payload?.info);
    }
    const bubble = itemToBubble(item);
    if (!bubble) continue;
    let node = null;
    if (bubble.cls === "user") {
      consumeEcho(bubble.text); // tail 确认，撤下乐观气泡
      node = bubbleNode(bubble);
    } else if (bubble.cls === "assistant") {
      endStream(); // tail 的完整消息到了，撤下流式草稿
      node = bubbleNode(bubble);
    } else if (bubble.cls === "tool") {
      node = toolRow(bubble);
    } else if (bubble.cls === "toolout") {
      node = attachToolOutput(bubble); // 通常并入已有调用行，返回 null
    } else if (bubble.cls === "diff") {
      node = diffNode(bubble);
    } else if (bubble.cls === "images") {
      if (bubble.user) consumeImgEcho(); // 纯图片消息的乐观气泡在此确认
      node = imagesNode(bubble);
    } else if (bubble.cls === "trunc") {
      node = document.createElement("div");
      node.className = "trunc";
      node.textContent = "· 此条内容过长已截断，请在电脑端查看 ·";
    }
    if (node) frag.appendChild(node);
  }
  // 有真实内容渲染时，清掉"新会话"空态提示（否则增量消息会追加在它下面）
  if (frag.firstChild) $("emptyhint")?.remove();
  $("log").appendChild(frag);
  if (stick) scrollToBottom();
  updateJump();
}

// —— 流式草稿：session.live 的 agent message delta 即时预览 ——
// 正式内容以 rollout tail 为准；tail 的 agent_message 到达即替换草稿
function appendStream(delta) {
  if (app.view !== "session") return;
  if (!app.stream) {
    const el = document.createElement("div");
    el.className = "msg assistant streaming";
    const raw = document.createElement("span");
    raw.className = "raw";
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    el.append(raw, cursor);
    const stick = nearBottom();
    $("log").appendChild(el);
    if (stick) scrollToBottom();
    app.stream = { el, raw, text: "" };
  }
  const stick = nearBottom();
  app.stream.text += delta;
  app.stream.raw.textContent = clip(app.stream.text);
  if (stick) scrollToBottom();
}

function endStream() {
  app.stream?.el.remove();
  app.stream = null;
}

// —— 下拉加载更早历史 ——
// 顶部还有更早的 rollout（daemon 快照只回填末尾一段，total > 已加载 histLimit）
function hasEarlier() {
  return app.histTotal > app.histLimit;
}
// 下拉手势参数：需要一段刻意的行程才触发，避免误触/过快触发
const PULL_MAX = 100;      // 提示条最大视觉高度
const PULL_TRIGGER = 64;   // 达到此高度松手即加载
const PULL_DEADZONE = 12;  // 起手空程：前 12px 不撑高，滤掉抖动
const PULL_FACTOR = 78;    // 阻尼系数：越大越"沉"，需拉更远
// 渐进阻尼（橡皮筋）：手指行程 dy → 提示条高度，越拉越沉、趋近 PULL_MAX
function pullResist(dy) {
  const over = dy - PULL_DEADZONE;
  if (over <= 0) return 0;
  return PULL_MAX * (1 - 1 / (1 + over / PULL_FACTOR));
}
function setPullTip(h, text, ready) {
  const t = $("pulltip");
  t.querySelector(".txt").textContent = text || "";
  t.classList.toggle("ready", !!ready);
  t.style.height = `${h}px`;
}
function resetPullTip() {
  const t = $("pulltip");
  t.classList.remove("drag", "ready", "loading", "end");
  t.style.height = "0px";
}
// 快照/其余分片可能分多条 notify 到达，防抖到齐后再一次性锚定滚动
function scheduleEarlierSettle() {
  clearTimeout(app.earlierTimer);
  app.earlierTimer = setTimeout(() => {
    const a = app.earlierAnchor;
    if (a) {
      const log = $("log");
      // 旧内容（含末尾乐观气泡）重渲染后位于末尾 a.count 个节点；旧首节点 = 第 (newCount - a.count) 个
      const idx = Math.max(0, log.childElementCount - a.count);
      const anchor = log.children[idx];
      if (anchor) {
        const delta = anchor.getBoundingClientRect().top - a.top;
        if (delta) window.scrollBy(0, delta); // 把用户原本在看的内容钉回原位，更早历史长在上面
      }
    }
    clearTimeout(app.earlierFailsafe);
    app.loadingEarlier = false;
    app.earlierAnchor = null;
    resetPullTip();
    updateJump();
  }, 90);
}
function loadEarlier() {
  if (app.loadingEarlier || !hasEarlier() || !app.session) return;
  const tip = $("pulltip");
  // 先把提示瞬间收平（drag 关过渡），再量锚点，确保与 settle 时的布局一致
  tip.classList.add("drag");
  tip.style.height = "0px";
  const log = $("log");
  const first = log.firstElementChild;
  app.earlierAnchor = {
    count: log.childElementCount,
    top: first ? first.getBoundingClientRect().top : 0,
  };
  tip.classList.remove("drag");
  app.loadingEarlier = true;
  app.histLimit = Math.min(5000, app.histLimit + 200);
  showToast("加载更早历史…", 4000);
  clearTimeout(app.earlierFailsafe);
  app.earlierFailsafe = setTimeout(() => {
    if (app.loadingEarlier) { app.loadingEarlier = false; app.earlierAnchor = null; resetPullTip(); }
  }, 8000);
  app.session.request("session.more", { limit: app.histLimit }).catch((e) => {
    clearTimeout(app.earlierFailsafe);
    app.loadingEarlier = false;
    app.earlierAnchor = null;
    resetPullTip();
    showBanner(`加载更早失败：${e.message}`);
  });
}
// 加载完成/首屏后：无更早历史时不必提示（提示只在下拉手势中出现）
function updateEarlierHint() {
  if (!hasEarlier() && !app.loadingEarlier) resetPullTip();
}
// 触摸下拉手势：仅在会话顶部起手，下拉过阈值松手即加载更早
function bindPullToLoad() {
  const viewer = $("viewer");
  let pull = null;
  viewer.addEventListener("touchstart", (e) => {
    if (app.view !== "session" || app.loadingEarlier || window.scrollY > 0) { pull = null; return; }
    pull = { startY: e.touches[0].clientY, ready: false };
  }, { passive: true });
  viewer.addEventListener("touchmove", (e) => {
    if (!pull) return;
    if (window.scrollY > 0) { pull = null; resetPullTip(); return; } // 已经滚离顶部：交回普通滚动
    const dy = e.touches[0].clientY - pull.startY;
    if (dy <= 0) { pull.ready = false; resetPullTip(); return; }
    const dist = pullResist(dy);   // 渐进阻尼，越拉越沉
    const t = $("pulltip");
    t.classList.add("drag");
    const canLoad = hasEarlier();
    const ready = canLoad && dist >= PULL_TRIGGER;
    if (!canLoad) t.classList.add("end"); else t.classList.remove("end");
    setPullTip(dist, !canLoad ? "已经到最开头了" : ready ? "松手加载更早" : "下拉加载更早", ready);
    pull.ready = ready;
  }, { passive: true });
  const finish = () => {
    if (!pull) return;
    const doLoad = pull.ready;
    pull = null;
    $("pulltip").classList.remove("drag", "ready");
    if (doLoad) loadEarlier();   // loadEarlier 会瞬间收平提示并弹出加载 toast
    else resetPullTip();          // 未过阈值：带过渡地回弹到 0，清掉 ready/end
  };
  viewer.addEventListener("touchend", finish, { passive: true });
  viewer.addEventListener("touchcancel", finish, { passive: true });
}

// live 事件：内容以 rollout tail（snapshot/event）为准；live 负责运行状态、
// 失败提示与 agent message delta 的流式预览（tail 到达即替换，不重复渲染）
function onLive(event, params) {
  if (event === "turn/started") { setRunning(true, "daemon"); return; }
  if (event === "turn/completed") {
    setRunning(false);
    // 草稿保留到 tail 的完整消息到达（renderInto 里 endStream），只摘掉光标
    app.stream?.el.querySelector(".cursor")?.remove();
    refreshTitle();
    return;
  }
  const norm = String(event).toLowerCase().replace(/[/_.-]/g, "");
  if (norm.includes("turnfailed") || norm.includes("turnerror")) {
    setRunning(false);
    endStream();
    showBanner("本轮执行失败。可重新发送，或查看电脑端日志");
    return;
  }
  if (norm.includes("turnaborted")) { setRunning(false); endStream(); return; }
  if (norm.includes("agentmessage") && norm.includes("delta")) {
    const delta = params?.delta ?? params?.text ?? params?.chunk;
    if (typeof delta === "string" && delta) appendStream(delta);
  }
}

function handleNotify(msg) {
  if (msg.method === "session.snapshot" && msg.params.sessionId === app.currentId) {
    if (typeof msg.params.total === "number") app.histTotal = msg.params.total;
    $("log").innerHTML = "";
    app.toolNodes.clear();
    app.seenImages.clear(); // 快照重放会重发同批 imageRef
    app.stream = null; // 元素已随 log 清空
    renderInto(msg.params.items);
    for (const e of app.echoes) $("log").appendChild(e.el); // 未被确认的乐观气泡重新挂上
    renderApprovals(); // snapshot 清空了 log，内嵌审批卡重挂
    if (!$("log").childElementCount) {
      // 新会话空态：给一句引导而不是一片空白（有 id，首条消息渲染时由 renderInto 清掉）
      $("log").innerHTML = '<div class="notice" id="emptyhint">这是一个新会话。在下方给 Codex 布置第一个任务，' +
        '例如："把 README 里的安装说明补全"。</div>';
    }
    // 加载更早触发的快照：不落底，等分片到齐后把滚动锚回原处；否则（首屏/重连）落底
    if (app.loadingEarlier) scheduleEarlierSettle();
    else scrollToBottom();
    updateEarlierHint();
  } else if (msg.method === "session.event" && msg.params.sessionId === app.currentId) {
    renderInto(msg.params.items);
    if (app.loadingEarlier) scheduleEarlierSettle(); // 快照余下分片，继续等到齐
  } else if (msg.method === "session.live" && msg.params.sessionId === app.currentId) {
    onLive(msg.params.event, msg.params.params);
  } else if (msg.method === "approval.request") {
    showApproval(msg.params); // 全局：任何页面都显示
  } else if (msg.method === "approval.resolved") {
    resolveApproval(msg.params.approvalKey); // 其他设备处理后同步消失
  } else if (msg.method === "board.changed") {
    scheduleListRefresh(); // 列表状态随运行/审批变化刷新
    // 当前会话的 daemon 驱动状态以看板为准（覆盖 tail 推断）
    if (msg.params?.sessionId === app.currentId && app.view === "session") {
      if (msg.params.running) setRunning(true, "daemon");
      else if (app.driver === "daemon") setRunning(false);
    }
  } else if (msg.method === "daemon.status") {
    net.engine = msg.params?.engine ?? null; // 引擎掉线/恢复（分层诊断）
    updateStatusPill();
  }
}

function autoGrow() {
  const el = $("input");
  el.style.height = "auto";
  // composer 还没显示时 scrollHeight 为 0（openSession 先填草稿后开卡片），
  // 这时不写死高度，交给 CSS 的 min-height，避免输入框被压成 0
  if (!el.scrollHeight) return;
  // 上限约四成屏高：写长任务描述不憋屈，超出后内部滚动
  el.style.height = `${Math.min(el.scrollHeight, Math.round(window.innerHeight * 0.4))}px`;
}

// —— 多电脑切换 ——
function updateChevron() {
  // 有配对就显示 ▾：单台时弹层也承担"添加/删除电脑"的管理入口
  $("chev").classList.toggle("show", listDaemons().length >= 1);
}

function removeDaemon(id) {
  const daemons = loadStore();
  delete daemons[id];
  localStorage.setItem("czr-daemons", JSON.stringify(daemons));
  updateChevron();
  openSheet(); // 重绘列表
}

function openSheet() {
  const daemons = listDaemons();
  if (!daemons.length) return; // 未配对时无从管理
  const active = app.session?.info.id;
  const box = $("daemonlist");
  box.innerHTML = "";
  for (const d of daemons) {
    const row = document.createElement("div");
    row.className = `drow${d.id === active ? " active" : ""}`;
    const dot = document.createElement("span"); dot.className = "ddot";
    const name = document.createElement("span"); name.className = "dname"; name.textContent = d.name || "电脑";
    row.append(dot, name);
    if (d.id === active) {
      const c = document.createElement("span"); c.className = "dcur"; c.textContent = "当前"; row.append(c);
    } else {
      row.onclick = () => { $("sheet").classList.remove("open"); switchDaemon(d.id); };
      // 删除本机的配对记录（换机/重装后清理残留；电脑侧撤销授权在电脑端做）
      const del = document.createElement("button");
      del.className = "ddel";
      del.textContent = "✕";
      del.setAttribute("aria-label", "删除这台电脑的配对记录");
      del.onclick = (e) => {
        e.stopPropagation();
        if (confirm(`删除「${d.name || "电脑"}」的配对记录？（仅从本手机移除，电脑端授权需在电脑上撤销）`)) {
          removeDaemon(d.id);
        }
      };
      row.appendChild(del);
    }
    box.appendChild(row);
  }
  const note = document.createElement("div");
  note.className = "sheetnote";
  note.textContent = "添加电脑：在新电脑上启用手机远程接管并生成配对链接，用本手机打开即可。";
  box.appendChild(note);
  $("sheet").classList.add("open");
}

async function switchDaemon(id) {
  const daemons = loadStore();
  const info = daemons[id];
  if (!info || info.id === app.session?.info.id) return;
  setActiveDaemon(id);
  // 拆掉当前连接与视图
  if (app.session) { app.session.closedByUser = true; app.session.ws?.close(); }
  Object.assign(net, { link: "connecting", daemon: null, engine: null, lastSeen: null });
  updateStatusPill();
  app.view = "list"; app.currentId = null;
  app.echoes = [];
  app.toolNodes.clear();
  app.seenImages.clear();
  app.stream = null;
  app.filter = "";
  $("search").value = "";
  app.drafts.clear();
  $("input").value = "";
  setRunning(false);
  updateJump();
  app.approvals.clear();
  document.body.classList.remove("insession");
  $("viewer").classList.remove("active"); $("composer").classList.remove("active");
  $("back").style.display = "none"; $("log").innerHTML = "";
  renderApprovals();
  $("list").classList.remove("hidden");
  $("list").innerHTML = '<div class="notice">正在连接…</div>';
  startSession(info);
}

// 令牌被电脑端撤销/失效（403）：终态。这台的设备令牌永远失效，清掉死记录，
// 有其它已配对电脑就切过去，否则回到未配对引导——而不是无限「重连中…」
function handleRevoked(info, err) {
  const name = info?.name || "电脑";
  removeDaemon(info.id); // 死令牌无留存价值（电脑端已撤销），从本机移除
  const next = loadDaemonInfo();
  if (next) {
    showBanner(`「${name}」已在电脑端移除本设备，已切到「${next.name || "电脑"}」`);
    startSession(next);
    return;
  }
  app.session = null;
  document.body.classList.remove("paired");
  setTitle("C叉叉");
  updateChevron();
  renderOnboarding();
  $("status").textContent = "未配对";
  $("status").className = "";
  showBanner(`「${name}」已在电脑端移除本设备，请重新扫码配对`);
}

// —— 启动会话（可反复调用以切换电脑）——
function startSession(info) {
  // 标题固定，电脑名走副标题（updateStatusPill）；未配对态没有底栏/菜单
  if (app.view === "list") setTitle("C叉叉");
  document.body.classList.add("paired");
  updateChevron();
  const session = new Session(info);
  app.session = session;
  app.models = null; // 模型列表随电脑走，切换后重新取
  session.onStatus = (patch) => {
    Object.assign(net, patch);
    updateStatusPill();
  };
  session.onNotify = handleNotify;
  session.onAuthFail = (err) => handleRevoked(session.info, err);
  session.onReady = async (auth) => {
    net.link = "ok";
    net.engine = auth?.engine ?? null;
    updateStatusPill();
    showBanner("");
    updateChevron();
    prefetchModels(); // 静默：给模型胶囊补上电脑端默认模型号
    try {
      if (app.view === "session" && app.currentId) {
        // 重连后恢复当前会话的实时订阅
        await session.request("session.watch", { sessionId: app.currentId });
      } else {
        await refreshList();
        // 通知深链：连上后直达对应会话
        if (app.deepLink) {
          const id = app.deepLink;
          app.deepLink = null;
          openSession(id, app.sessionNames.get(id) || "会话");
        }
      }
    } catch (err) {
      showBanner(`加载失败：${err.message}`);
    }
  };
  session.start().catch((err) => showBanner(`连接失败：${err.message}`));
}

// 快捷回复：覆盖手机上最常见的三种指示，点选即发，免打字（仅空闲时显示）

function renderOnboarding() {
  $("list").innerHTML = `
    <div class="onboard">
      <h2>连接你的电脑</h2>
      <p>在手机上实时掌握电脑上的 Codex：看任务进展、处理审批、布置下一步。</p>
      <ol>
        <li>在电脑上打开 Codex-叉叉，点菜单栏的 Codex 图标</li>
        <li>选「启用手机远程接管」，再点「扫码配对」</li>
        <li>用手机相机扫码（或点扫码页里的链接复制到手机打开）</li>
      </ol>
      <p class="obdim">扫码即永久连接，可在电脑端「已配对设备」随时移除。全程端到端加密，中继服务器读不到你的会话内容。</p>
      <p class="obdim">开发者也可用命令行生成配对链接：<code>node remote/daemon/src/main.mjs pair</code></p>
    </div>`;
}

// —— 一次性启动 ——
async function main() {
  // 一次性 DOM 绑定
  // 页面左上角返回也走 history.back()，与系统返回键统一：消费掉进会话时压的历史项，
  // 由下面的 popstate 处理器执行 closeSession，避免残留一条“前进”历史。
  $("back").onclick = () => history.back();
  // 关掉浏览器的滚动自动恢复：SPA 自己管滚动，否则按返回时 popstate 会把还显示着的
  // 会话页滚动位置回滚到首页记忆值，造成返回瞬间“闪一下”。
  if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  // 起手压一条"首页哨兵"历史项，让首页的返回键也能被 popstate 接住（否则首页返回直接退出）。
  history.pushState({ czr: "home" }, "");
  // 手机系统返回键/右滑返回：
  //  · 会话内 → 回首页（会话历史项已被弹出，栈里仍留首页哨兵）；
  //  · 首页 → 拦一次并提示，1.6s 内再按一次才真正退出（防误触）。
  window.addEventListener("popstate", () => {
    if (app.view === "session") { closeSession().catch(() => {}); return; }
    if (app.backExit) { history.back(); return; } // 第二次：不再压回，放行退出
    history.pushState({ czr: "home" }, ""); // 第一次：压回哨兵，停留在首页
    app.backExit = true;
    showToast("再按一次返回退出");
    clearTimeout(app.backExitTimer);
    app.backExitTimer = setTimeout(() => { app.backExit = false; }, 1600);
  });
  bindPullToLoad(); // 会话顶部下拉加载更早历史
  $("send").onclick = sendMessage;
  $("stop").onclick = stopTurn;
  $("input").addEventListener("input", () => { autoGrow(); updateSendState(); });
  // ➕ 动作菜单：拍照 / 选照片 / 粘贴图片
  $("attach").onclick = (e) => {
    e.stopPropagation();
    $("plusmenu").classList.toggle("open");
  };
  document.addEventListener("click", (e) => {
    if (!$("plusmenu").contains(e.target)) $("plusmenu").classList.remove("open");
    if (!$("topmenu").contains(e.target)) $("topmenu").classList.remove("open");
  });
  $("plusmenu").onclick = async (e) => {
    const act = e.target.closest("button")?.dataset.act;
    if (!act) return;
    $("plusmenu").classList.remove("open");
    const file = $("file");
    if (act === "plan") {
      setPlanMode(!app.planMode);
    } else if (act === "goal") {
      await editGoal();
    } else if (act === "tfile") {
      $("tfile").click();
    } else if (act === "camera") { // capture 属性直接起相机；选照片路径则走相册
      file.setAttribute("capture", "environment");
      file.click();
    } else if (act === "photos") {
      file.removeAttribute("capture");
      file.click();
    } else if (act === "paste") {
      await pasteImage();
    }
  };
  $("file").onchange = async () => {
    await pickFiles([...$("file").files]);
    $("file").value = ""; // 允许再次选择同一张
  };
  $("tfile").onchange = async () => {
    const f = $("tfile").files[0];
    if (f) await attachTextFile(f).catch(() => showBanner("读取文件失败"));
    $("tfile").value = "";
  };
  $("planpill").onclick = () => setPlanMode(false);
  app.turnOpts = loadTurnOpts();
  updateOptButtons();
  $("permbtn").onclick = openPermSheet;
  $("modelbtn").onclick = openModelSheet;
  $("permsheet").onclick = (e) => { if (e.target === $("permsheet")) $("permsheet").classList.remove("open"); };
  $("modelsheet").onclick = (e) => { if (e.target === $("modelsheet")) $("modelsheet").classList.remove("open"); };
  // 桌面（精确指针）Enter 发送、Shift+Enter 换行；手机键盘 Enter 保持换行；中文输入法合成中不触发
  $("input").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey && !e.isComposing && matchMedia("(pointer: fine)").matches) {
      e.preventDefault();
      sendMessage();
    }
  });
  $("jump").onclick = () => { scrollToBottom(); updateJump(); };
  window.addEventListener("scroll", updateJump, { passive: true });
  // iOS 软键盘不压缩布局视口（不认 interactive-widget），fixed 输入区会被键盘整个盖住：
  // 用 visualViewport 实测可视高度，把输入区顶到键盘上沿
  if (window.visualViewport) {
    const vv = window.visualViewport;
    const adjust = () => {
      const gap = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      const shift = gap ? `translateY(-${gap}px)` : "";
      $("composer").style.transform = shift;
      $("jump").style.transform = shift;
      $("homebar").style.transform = shift; // 首页搜索框也不能被键盘盖住
    };
    vv.addEventListener("resize", adjust);
    vv.addEventListener("scroll", adjust);
  }
  $("search").addEventListener("input", () => {
    app.filter = $("search").value;
    renderList(app.lastSessions);
  });
  $("hmid").onclick = openSheet;
  $("newchat").onclick = newSession;
  // ⋯ 菜单：组织方式切换 + 外观 + 管理入口
  applyTheme(getTheme()); // 补齐 meta theme-color（变量层已在头部脚本提前生效）
  $("menubtn").onclick = (e) => {
    e.stopPropagation();
    updateOrganizeChecks();
    updateThemeChecks();
    $("topmenu").classList.toggle("open");
  };
  // 会话视图右上角「新建会话」：复用首页项目头的同款 COMPOSE 图标，在当前会话同目录直接开新会话
  $("newsess").innerHTML = COMPOSE_SVG;
  $("newsess").onclick = async () => {
    if (net.link !== "ok" || net.daemon === false) { showBanner("电脑离线，暂时无法新建会话"); return; }
    const cur = app.lastSessions.find((x) => x.id === app.currentId);
    const cwd = cur?.cwd || undefined; // 当前会话工作目录；取不到则用电脑端默认目录
    if (app.currentId) app.drafts.set(app.currentId, $("input").value); // 保住当前草稿
    await app.session.request("session.unwatch").catch(() => {}); // 停掉当前会话的 watch
    createSession(cwd);
  };
  $("topmenu").onclick = (e) => {
    const act = e.target.closest("button")?.dataset.act;
    if (!act) return;
    $("topmenu").classList.remove("open");
    if (act === "proj" || act === "time") {
      app.organize = act;
      localStorage.setItem("czr-organize", act);
      renderList(app.lastSessions);
    } else if (act === "th-auto" || act === "th-light" || act === "th-dark") {
      applyTheme(act.slice(3));
    } else if (act === "pc") {
      openSheet();
    } else if (act === "diag") {
      openDiag();
    }
  };
  $("sheet").onclick = (e) => { if (e.target === $("sheet")) $("sheet").classList.remove("open"); };
  $("dirsheet").onclick = (e) => { if (e.target === $("dirsheet")) $("dirsheet").classList.remove("open"); };
  $("diagsheet").onclick = (e) => { if (e.target === $("diagsheet")) $("diagsheet").classList.remove("open"); };
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") app.session?.ensureAlive();
    else app.session?.stopPing(); // 切后台立即停心跳，不留后台流量
  });
  // 蜂窝↔WiFi 切换、飞行模式恢复：不等退避计时，马上验活/重连。
  // 后台收到 online 不动作（保持零后台活动），回前台由 visibilitychange 补上
  window.addEventListener("online", () => {
    if (document.visibilityState === "visible") app.session?.ensureAlive();
  });
  // 注册 Service Worker（PWA 离线壳）
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  }

  // 通知深链 #s=<sessionId>：连上后直达该会话（在 loadDaemonInfo 之前解析，二者不共存）
  const hashParams = new URLSearchParams(location.hash.slice(1));
  if (hashParams.get("s")) {
    app.deepLink = hashParams.get("s");
    history.replaceState(null, "", location.pathname);
  }

  const info = loadDaemonInfo();
  if (!info) {
    renderOnboarding();
    $("status").textContent = "未配对";
    return;
  }
  startSession(info);
}
// 本地预览调试钩子：控制台注入假数据即可渲染各视图，不影响正常逻辑
window.__czr = { app, net, renderList, renderInto, renderApprovals, showApproval, setRunning, setTitle,
                 updateStatusPill, openDiag, onLive, appendStream, renderOnboarding,
                 renderAttachments, updateSendState, enqueue, addEcho, autoGrow,
                 openPermSheet, openModelSheet, updateOptButtons, renderModelSheet,
                 setPlanMode, editGoal, attachTextFile };
main();
</script>
</body>
</html>
