name: Release package

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Codex-叉叉 version. Defaults to the package.json version."
        required: false
        type: string
      source_codex_zip_url:
        description: "Official Windows ChatGPT/Codex source archive (.zip or .msix). Prefer the repository secret for private URLs."
        required: false
        type: string
      source_codex_sha256:
        description: "Optional SHA-256 for the source zip."
        required: false
        type: string
      source_codex_label:
        description: "Optional label used in the installer filename, for example ChatGPT-26.707.31428."
        required: false
        type: string
      source_codex_macos_dmg_url:
        description: "Official ChatGPT/Codex macOS arm64 source archive (.zip or .dmg). Legacy input name retained for compatibility."
        required: false
        type: string
      source_codex_macos_dmg_sha256:
        description: "Optional SHA-256 for the macOS arm64 source archive."
        required: false
        type: string
      source_codex_macos_x64_dmg_url:
        description: "Official ChatGPT/Codex macOS Intel x64 source archive (.zip or .dmg). Legacy input name retained for compatibility."
        required: false
        type: string
      source_codex_macos_x64_dmg_sha256:
        description: "Optional SHA-256 for the macOS Intel x64 source archive."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-metadata:
    name: Create release metadata
    if: startsWith(github.event.release.tag_name || github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Create release for tag push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
            exit 0
          fi
          notes="$RUNNER_TEMP/codex-zh-release-notes.md"
          node ./scripts/generate-release-notes.mjs --tag "$RELEASE_TAG" --out "$notes"
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Codex-叉叉 $RELEASE_TAG" \
            --notes-file "$notes"

  windows-installer:
    name: Build Windows installer
    # Windows remains opt-in until CODEX_WINDOWS_APP_ZIP_URL is updated to the
    # pinned ChatGPT source. This must not block a macOS-only release.
    if: startsWith(github.event.release.tag_name || github.ref_name, 'v') && vars.CODEX_ZH_BUILD_WINDOWS == 'true'
    needs: release-metadata
    runs-on: windows-2022
    env:
      CODEX_WINDOWS_APP_ZIP_URL: ${{ secrets.CODEX_WINDOWS_APP_ZIP_URL }}
      CODEX_WINDOWS_APP_ZIP_SHA256: ${{ secrets.CODEX_WINDOWS_APP_ZIP_SHA256 }}
      CODEX_WINDOWS_APP_LABEL: ${{ secrets.CODEX_WINDOWS_APP_LABEL }}
      SOURCE_CODEX_ZIP_URL_INPUT: ${{ inputs.source_codex_zip_url }}
      SOURCE_CODEX_SHA256_INPUT: ${{ inputs.source_codex_sha256 }}
      SOURCE_CODEX_LABEL_INPUT: ${{ inputs.source_codex_label }}
      VERSION_INPUT: ${{ inputs.version }}
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
      PINNED_SOURCE_MANIFEST: release-sources.json
      SOURCE_ARCHIVE: C:\Codex-ZH\source\codex-windows-app.zip
      SOURCE_EXTRACT_ROOT: C:\Codex-ZH\source\expanded
      STAGING_ROOT: C:\Codex-ZH\staging
      RELEASE_OUTPUT_DIR: C:\Codex-ZH\release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run tests
        run: npm test

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --yes --no-progress

      - name: Resolve release version
        shell: powershell
        run: |
          $version = $env:VERSION_INPUT
          if (!$version) {
            $version = $env:RELEASE_TAG
          }
          if (!$version) {
            $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          }
          $version = $version.Trim() -replace '^refs/tags/', '' -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
            throw "Version must look like SemVer, with optional leading v in the tag. Got: $version"
          }
          $buildStamp = "release-" + ($version -replace '[^0-9A-Za-z._-]', '-')
          "CODEX_ZH_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CODEX_ZH_BUILD_STAMP=$buildStamp" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Download official ChatGPT app source
        shell: powershell
        run: |
          $sourceUrl = $env:SOURCE_CODEX_ZIP_URL_INPUT
          if (!$sourceUrl) {
            $sourceUrl = $env:CODEX_WINDOWS_APP_ZIP_URL
          }
          if (!$sourceUrl) {
            throw "Set CODEX_WINDOWS_APP_ZIP_URL to the pinned official ChatGPT/Codex Windows source archive."
          }

          $expectedHash = $env:SOURCE_CODEX_SHA256_INPUT
          if (!$expectedHash) {
            $expectedHash = node -p "require('./$env:PINNED_SOURCE_MANIFEST').windows.x64.sha256"
          }
          if (!$expectedHash) {
            $expectedHash = $env:CODEX_WINDOWS_APP_ZIP_SHA256
          }
          if (!$expectedHash) {
            throw "Set CODEX_WINDOWS_APP_ZIP_SHA256 so release builds are pinned to one verified ChatGPT/Codex source archive."
          }

          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $env:SOURCE_ARCHIVE) | Out-Null
          $ProgressPreference = "SilentlyContinue"
          Invoke-WebRequest -Uri $sourceUrl -OutFile $env:SOURCE_ARCHIVE

          $actualHash = (Get-FileHash -Algorithm SHA256 $env:SOURCE_ARCHIVE).Hash.ToLowerInvariant()
          if ($actualHash -ne $expectedHash.ToLowerInvariant()) {
            throw "Source archive SHA-256 mismatch. Expected $expectedHash, got $actualHash."
          }

      - name: Extract and verify official ChatGPT app source
        shell: powershell
        run: |
          if (Test-Path -LiteralPath $env:SOURCE_EXTRACT_ROOT) {
            Remove-Item -LiteralPath $env:SOURCE_EXTRACT_ROOT -Force -Recurse
          }
          New-Item -ItemType Directory -Force -Path $env:SOURCE_EXTRACT_ROOT | Out-Null
          Expand-Archive -LiteralPath $env:SOURCE_ARCHIVE -DestinationPath $env:SOURCE_EXTRACT_ROOT -Force

          # Raw Microsoft Store MSIX archives percent-encode scoped package
          # directories as %40name while app.asar references @name. Normalize
          # those path segments before @electron/asar follows unpacked entries.
          Get-ChildItem -LiteralPath $env:SOURCE_EXTRACT_ROOT -Directory -Recurse |
            Where-Object { $_.Name -match '%40' } |
            Sort-Object { $_.FullName.Length } -Descending |
            ForEach-Object {
              $decoded = $_.Name -replace '%40', '@'
              $destination = Join-Path $_.Parent.FullName $decoded
              if (Test-Path -LiteralPath $destination) {
                throw "Cannot normalize MSIX scoped package path because destination exists: $destination"
              }
              Rename-Item -LiteralPath $_.FullName -NewName $decoded
            }

          $candidates = Get-ChildItem -LiteralPath $env:SOURCE_EXTRACT_ROOT -File -Recurse |
            Where-Object { $_.Name -in @("ChatGPT.exe", "Codex.exe") } |
            Where-Object { Test-Path -LiteralPath (Join-Path $_.DirectoryName "resources\app.asar") } |
            Sort-Object @{ Expression = { if ($_.Name -eq "ChatGPT.exe") { 0 } else { 1 } } }, @{ Expression = { $_.FullName.Length } }
          if (!$candidates) {
            throw "Could not find a ChatGPT.exe/Codex.exe folder with resources\app.asar inside the source zip."
          }

          $sourceAppDir = $candidates[0].DirectoryName
          $expectedDesktopVersion = node -p "require('./$env:PINNED_SOURCE_MANIFEST').desktopVersion"
          if (!$expectedDesktopVersion) {
            throw "Missing desktopVersion in $env:PINNED_SOURCE_MANIFEST."
          }

          $versionProbeDir = Join-Path $env:RUNNER_TEMP "chatgpt-source-version"
          if (Test-Path -LiteralPath $versionProbeDir) {
            Remove-Item -LiteralPath $versionProbeDir -Force -Recurse
          }
          New-Item -ItemType Directory -Force -Path $versionProbeDir | Out-Null
          Push-Location $versionProbeDir
          try {
            & npx.cmd --yes "@electron/asar" extract-file (Join-Path $sourceAppDir "resources\app.asar") package.json
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to inspect the official ChatGPT app.asar version."
            }
            $actualDesktopVersion = (Get-Content -Raw package.json | ConvertFrom-Json).version
          } finally {
            Pop-Location
          }
          if ($actualDesktopVersion -ne $expectedDesktopVersion) {
            throw "ChatGPT desktop kernel version mismatch. Expected $expectedDesktopVersion, got $actualDesktopVersion. Update the pinned Windows archive before releasing."
          }

          "CODEX_SOURCE_APP_DIR=$sourceAppDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build staged app
        shell: powershell
        run: |
          .\scripts\build-codex-zh-staging.ps1 `
            -SourceAppDir $env:CODEX_SOURCE_APP_DIR `
            -ProjectRoot $env:GITHUB_WORKSPACE `
            -OutputRoot $env:STAGING_ROOT `
            -BuildStamp $env:CODEX_ZH_BUILD_STAMP

      - name: Build installer
        shell: powershell
        run: |
          $sourceLabel = $env:SOURCE_CODEX_LABEL_INPUT
          if (!$sourceLabel) {
            $sourceLabel = $env:CODEX_WINDOWS_APP_LABEL
          }

          $installerArgs = @{
            StageRoot = Join-Path $env:STAGING_ROOT "Codex-ZH-$env:CODEX_ZH_BUILD_STAMP"
            ProjectRoot = $env:GITHUB_WORKSPACE
            OutputDir = $env:RELEASE_OUTPUT_DIR
            Version = $env:CODEX_ZH_VERSION
          }
          if ($sourceLabel) {
            $installerArgs.SourceCodexLabel = $sourceLabel
          }

          .\scripts\build-codex-zh-installer.ps1 @installerArgs

      - name: Smoke test installer
        shell: powershell
        run: |
          $installer = Get-ChildItem -LiteralPath $env:RELEASE_OUTPUT_DIR -Filter "*.exe" -File | Select-Object -First 1
          if (!$installer) {
            throw "Installer not found in $env:RELEASE_OUTPUT_DIR"
          }

          $process = Start-Process -FilePath $installer.FullName -ArgumentList @("/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART") -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Installer smoke test failed with exit code $($process.ExitCode)."
          }

          $installDir = Join-Path $env:ProgramFiles "Codex-ZH"
          $launcher = Join-Path $installDir "CodexZhLauncher.exe"
          $codexCli = Join-Path $installDir "app\resources\codex.exe"
          if (!(Test-Path -LiteralPath $launcher)) {
            throw "Installed launcher not found: $launcher"
          }
          if (!(Test-Path -LiteralPath $codexCli)) {
            throw "Installed codex CLI not found: $codexCli"
          }

          $launcherProcess = Start-Process -FilePath $launcher -ArgumentList @("--no-launch") -Wait -PassThru
          if ($launcherProcess.ExitCode -ne 0) {
            throw "Launcher self-test failed with exit code $($launcherProcess.ExitCode)."
          }

          & $codexCli --version
          if ($LASTEXITCODE -ne 0) {
            throw "codex version check failed with exit code $LASTEXITCODE."
          }

          $doctorOutput = & $codexCli doctor --summary --ascii --no-color 2>&1
          $doctorExitCode = $LASTEXITCODE
          $doctorOutput | ForEach-Object { Write-Host $_ }
          $doctorText = $doctorOutput -join "`n"
          if ($doctorText -notmatch "\[ok\]\s+install\s+consistent") {
            throw "codex doctor did not report a consistent install."
          }
          if ($doctorExitCode -ne 0) {
            if ($doctorText -notmatch "no Codex credentials were found") {
              throw "codex doctor failed with exit code $doctorExitCode."
            }
            Write-Warning "codex doctor reported missing credentials in CI; install consistency checks passed."
          }
          $global:LASTEXITCODE = 0

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-zh-windows-installer
          path: |
            C:\Codex-ZH\release\*.exe
            C:\Codex-ZH\release\*.sha256
          if-no-files-found: error

      - name: Create release for tag push
        if: github.event_name == 'push'
        # pwsh (7) 默认按 UTF-8 读取 run 脚本；Windows PowerShell 5.1 按系统 ANSI
        # 代码页读取，会把标题里的中文（如 Codex-叉叉）读成乱码后发给 gh。
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $previousErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = "Continue"
          $releaseViewOutput = & gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY 2>&1
          $releaseViewExitCode = $LASTEXITCODE
          $ErrorActionPreference = $previousErrorActionPreference

          if ($releaseViewExitCode -eq 0) {
            Write-Host "Release $env:RELEASE_TAG already exists."
          } else {
            $releaseNotesPath = Join-Path $env:RUNNER_TEMP "codex-zh-release-notes.md"
            node .\scripts\generate-release-notes.mjs `
              --tag $env:RELEASE_TAG `
              --out $releaseNotesPath

            $releaseViewText = $releaseViewOutput -join "`n"
            if ($releaseViewText -notmatch "release not found") {
              $releaseViewOutput | ForEach-Object { Write-Host $_ }
              throw "Failed to inspect release $env:RELEASE_TAG with exit code $releaseViewExitCode."
            }

            & gh release create $env:RELEASE_TAG `
              --repo $env:GITHUB_REPOSITORY `
              --target $env:GITHUB_SHA `
              --title "Codex-叉叉 $env:RELEASE_TAG" `
              --notes-file $releaseNotesPath
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release $env:RELEASE_TAG."
            }
          }
          $global:LASTEXITCODE = 0

      - name: Upload release assets
        if: github.event_name == 'release' || github.event_name == 'push'
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem -LiteralPath $env:RELEASE_OUTPUT_DIR -File |
            Where-Object { $_.Extension -in @(".exe", ".sha256") } |
            ForEach-Object { $_.FullName }
          if (!$assets) {
            throw "No release assets found in $env:RELEASE_OUTPUT_DIR"
          }
          & gh release upload $env:RELEASE_TAG @assets --clobber

  macos-installer:
    name: Build macOS ${{ matrix.arch }} dmg
    if: startsWith(github.event.release.tag_name || github.ref_name, 'v')
    needs: release-metadata
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    env:
      CODEX_MACOS_APP_DMG_URL: ${{ secrets.CODEX_MACOS_APP_DMG_URL }}
      CODEX_MACOS_APP_DMG_SHA256: ${{ secrets.CODEX_MACOS_APP_DMG_SHA256 }}
      CODEX_MACOS_X64_APP_DMG_URL: ${{ secrets.CODEX_MACOS_X64_APP_DMG_URL }}
      CODEX_MACOS_X64_APP_DMG_SHA256: ${{ secrets.CODEX_MACOS_X64_APP_DMG_SHA256 }}
      SOURCE_MACOS_DMG_URL_INPUT: ${{ inputs.source_codex_macos_dmg_url }}
      SOURCE_MACOS_DMG_SHA256_INPUT: ${{ inputs.source_codex_macos_dmg_sha256 }}
      SOURCE_MACOS_X64_DMG_URL_INPUT: ${{ inputs.source_codex_macos_x64_dmg_url }}
      SOURCE_MACOS_X64_DMG_SHA256_INPUT: ${{ inputs.source_codex_macos_x64_dmg_sha256 }}
      MAC_ARCH: ${{ matrix.arch }}
      VERSION_INPUT: ${{ inputs.version }}
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
      PINNED_SOURCE_MANIFEST: release-sources.json
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run tests
        run: npm test

      - name: Resolve release version
        run: |
          version="${VERSION_INPUT:-$RELEASE_TAG}"
          if [ -z "$version" ]; then version="$(node -p "require('./package.json').version")"; fi
          version="${version#refs/tags/}"; version="${version#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$'; then
            echo "Version must look like SemVer. Got: $version"; exit 1
          fi
          echo "CODEX_ZH_VERSION=$version" >> "$GITHUB_ENV"
          echo "SOURCE_ARCHIVE=$RUNNER_TEMP/chatgpt-macos-source" >> "$GITHUB_ENV"
          echo "SOURCE_EXPANDED=$RUNNER_TEMP/chatgpt-macos-expanded" >> "$GITHUB_ENV"
          echo "SOURCE_MOUNT=$RUNNER_TEMP/chatgpt-macos-mount" >> "$GITHUB_ENV"
          echo "STAGING_DIR=$RUNNER_TEMP/staging" >> "$GITHUB_ENV"
          echo "RELEASE_OUTPUT_DIR=$RUNNER_TEMP/release" >> "$GITHUB_ENV"

      - name: Download official ChatGPT/Codex macOS app source
        run: |
          case "$MAC_ARCH" in
            arm64)
              url="$SOURCE_MACOS_DMG_URL_INPUT"
              hash="$SOURCE_MACOS_DMG_SHA256_INPUT"
              legacy_url="$CODEX_MACOS_APP_DMG_URL"
              legacy_hash="$CODEX_MACOS_APP_DMG_SHA256"
              secret_name="CODEX_MACOS_APP_DMG_URL / CODEX_MACOS_APP_DMG_SHA256"
              ;;
            x64)
              url="$SOURCE_MACOS_X64_DMG_URL_INPUT"
              hash="$SOURCE_MACOS_X64_DMG_SHA256_INPUT"
              legacy_url="$CODEX_MACOS_X64_APP_DMG_URL"
              legacy_hash="$CODEX_MACOS_X64_APP_DMG_SHA256"
              secret_name="CODEX_MACOS_X64_APP_DMG_URL / CODEX_MACOS_X64_APP_DMG_SHA256"
              ;;
            *)
              echo "Unsupported MAC_ARCH: $MAC_ARCH"; exit 1
              ;;
          esac
          if [ -z "$url" ]; then
            url="$(node -p "require('./$PINNED_SOURCE_MANIFEST').macos['$MAC_ARCH'].url" 2>/dev/null || true)"
          fi
          if [ -z "$hash" ]; then
            hash="$(node -p "require('./$PINNED_SOURCE_MANIFEST').macos['$MAC_ARCH'].sha256" 2>/dev/null || true)"
          fi
          url="${url:-$legacy_url}"
          hash="${hash:-$legacy_hash}"
          [ -n "$url" ] || { echo "Set $secret_name or $PINNED_SOURCE_MANIFEST to a pinned official ChatGPT/Codex macOS $MAC_ARCH archive."; exit 1; }
          [ -n "$hash" ] || { echo "Set $secret_name or $PINNED_SOURCE_MANIFEST so release builds are pinned."; exit 1; }
          curl -fsSL "$url" -o "$SOURCE_ARCHIVE"
          actual="$(shasum -a 256 "$SOURCE_ARCHIVE" | awk '{print $1}')"
          expected="$(printf '%s' "$hash" | tr 'A-F' 'a-f')"
          [ "$actual" = "$expected" ] || { echo "Source archive SHA-256 mismatch. Expected $expected, got $actual."; exit 1; }

      - name: Extract ChatGPT.app or Codex.app from source archive
        run: |
          mkdir -p "$SOURCE_EXPANDED"
          if unzip -tq "$SOURCE_ARCHIVE" >/dev/null 2>&1; then
            ditto -x -k "$SOURCE_ARCHIVE" "$SOURCE_EXPANDED"
            search_root="$SOURCE_EXPANDED"
          else
            hdiutil attach "$SOURCE_ARCHIVE" -nobrowse -readonly -mountpoint "$SOURCE_MOUNT"
            search_root="$SOURCE_MOUNT"
          fi
          app="$(find "$search_root" -maxdepth 3 -type d \( -name 'ChatGPT.app' -o -name 'Codex.app' \) | sort | head -1)"
          if [ -z "$app" ]; then
            [ "$search_root" != "$SOURCE_MOUNT" ] || hdiutil detach "$SOURCE_MOUNT" || true
            echo "ChatGPT.app or Codex.app not found in source archive."
            exit 1
          fi
          ditto "$app" "$RUNNER_TEMP/official-desktop.app"
          [ "$search_root" != "$SOURCE_MOUNT" ] || hdiutil detach "$SOURCE_MOUNT"
          echo "CODEX_SOURCE_APP=$RUNNER_TEMP/official-desktop.app" >> "$GITHUB_ENV"

      - name: Build staged app and dmg
        run: |
          node scripts/build-codex-zh-staging-mac.mjs --source-app "$CODEX_SOURCE_APP" --out-dir "$STAGING_DIR" --version "$CODEX_ZH_VERSION" --arch "$MAC_ARCH"
          node scripts/build-codex-zh-dmg-mac.mjs --app "$STAGING_DIR/Codex-叉叉.app" --out-dir "$RELEASE_OUTPUT_DIR" --version "$CODEX_ZH_VERSION" --arch "$MAC_ARCH"

      - name: Smoke test built app
        run: |
          APP="$STAGING_DIR/Codex-叉叉.app"
          codesign --verify --deep --strict "$APP"
          expected_arch="$MAC_ARCH"
          if [ "$expected_arch" = "x64" ]; then expected_arch="x86_64"; fi
          source_executable="$(node -p "require('$STAGING_DIR/codex-zh-build-mac.json').sourceExecutable")"
          lipo -info "$APP/Contents/MacOS/$source_executable" | grep -q "$expected_arch"
          lipo -info "$APP/Contents/Resources/codex-zh/bin/CodexZhConfig" | grep -q "$expected_arch"
          lipo -info "$APP/Contents/Resources/codex-zh/bin/CodexZhRemoteMenu" | grep -q "$expected_arch"
          # Run the orchestrator self-test with the runner's Node (avoids depending on
          # the bundle's re-signed Node under CI security policy).
          result="$(CODEX_ZH_APP_ROOT="$APP" node "$APP/Contents/Resources/codex-zh/launcher/mac/codex-zh-launcher.mjs" --self-test --print-result)"
          echo "$result"
          printf '%s' "$result" | grep -q '"status":"ok"' || { echo "Launcher self-test failed."; exit 1; }
          ls "$RELEASE_OUTPUT_DIR"/*.dmg >/dev/null

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-zh-macos-${{ matrix.arch }}-dmg
          path: |
            ${{ env.RELEASE_OUTPUT_DIR }}/*.dmg
            ${{ env.RELEASE_OUTPUT_DIR }}/*.sha256
          if-no-files-found: error

      - name: Upload release assets
        if: github.event_name == 'release' || github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" "$RELEASE_OUTPUT_DIR"/*.dmg "$RELEASE_OUTPUT_DIR"/*.dmg.sha256 --clobber

  update-readme:
    name: Update README download links
    if: (github.event_name == 'release' || github.event_name == 'push') && (always() && needs.macos-installer.result == 'success')
    needs: [release-metadata, macos-installer]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
      VERSION_INPUT: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Gather release checksums and update README
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${VERSION_INPUT:-$RELEASE_TAG}"
          version="${version#refs/tags/}"; version="${version#v}"
          checksums="$RUNNER_TEMP/checksums"
          mkdir -p "$checksums"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.sha256' --dir "$checksums" || true
          if [ -z "$(ls -A "$checksums" 2>/dev/null)" ]; then
            echo "No checksum assets found for $RELEASE_TAG; skipping README update."; exit 0
          fi

          git fetch origin main
          git checkout -B main origin/main
          node ./scripts/update-readme-downloads.mjs \
            --release-output-dir "$checksums" \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG" \
            --version "$version"

          if [ -z "$(git status --porcelain README.md)" ]; then
            echo "README download links already match $RELEASE_TAG."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: 更新 $RELEASE_TAG 下载链接"
          git push origin HEAD:main
