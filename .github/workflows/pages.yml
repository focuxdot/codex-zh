name: Deploy tutorial site

on:
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "site/**"
      - "remote/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Add Remote web client (PWA)
        run: |
          mkdir -p site/remote/icons
          cp remote/web/index.html site/remote/index.html
          cp remote/web/manifest.webmanifest site/remote/manifest.webmanifest
          cp remote/web/sw.js site/remote/sw.js
          cp remote/web/icons/*.png site/remote/icons/

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
